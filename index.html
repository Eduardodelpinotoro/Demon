<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Diablo RPG - Mazmorra One-Page Dungeon | Habitaciones Grandes</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
        body{background:#050508;overflow:hidden;font-family:'Segoe UI',system-ui;touch-action:none;}
        canvas{width:100%!important;height:100%!important;outline:none;}
        
        .diablo-hud{
            position:fixed;
            bottom:30px;
            left:0;
            right:0;
            display:flex;
            justify-content:center;
            gap:32px;
            z-index:250;
            pointer-events:none;
        }
        .orb{
            width:60px;
            height:60px;
            border-radius:50%;
            background:#2a1a1a;
            border:3px solid #b89a6a;
            box-shadow:0 0 15px rgba(0,0,0,0.5);
            position:relative;
            overflow:hidden;
            backdrop-filter:blur(4px);
            pointer-events:none;
        }
        .orb-inner{
            position:absolute;
            bottom:0;
            left:0;
            right:0;
            background:#c0392b;
            transition:height 0.2s;
            height:100%;
        }
        .orb-mana .orb-inner{background:#2980b9;}
        
        .sidebar-menu{
            position:fixed;
            top:16px;
            right:16px;
            z-index:270;
            display:flex;
            flex-direction:column;
            align-items:flex-end;
            gap:8px;
        }
        .sidebar-top-row{
            display:flex;
            gap:8px;
            align-items:center;
        }
        .zoom-btn{
            background:rgba(30,25,45,0.85);
            backdrop-filter:blur(8px);
            border:1px solid #c8aa4e;
            width:36px;
            height:36px;
            border-radius:30px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:22px;
            font-weight:bold;
            color:#f7d86c;
            cursor:pointer;
            box-shadow:0 2px 8px black;
            transition:0.1s;
        }
        .zoom-btn:active{transform:scale(0.92);}
        .menu-toggle-btn{
            background:rgba(30,25,45,0.85);
            backdrop-filter:blur(8px);
            border:1px solid #c8aa4e;
            width:36px;
            height:36px;
            border-radius:30px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:20px;
            color:#f7d86c;
            cursor:pointer;
        }
        .menu-toggle-btn:active{transform:scale(0.92);}
        .sidebar-panel{
            display:flex;
            flex-direction:column;
            gap:8px;
            background:rgba(14,10,24,0.92);
            backdrop-filter:blur(14px);
            border:1px solid #c8aa6e;
            border-radius:16px;
            padding:10px 12px;
            box-shadow:0 4px 16px rgba(0,0,0,0.6);
            pointer-events:auto;
            transform:translateX(120%);
            opacity:0;
            transition:transform 0.22s cubic-bezier(0.22,1,0.36,1), opacity 0.18s;
        }
        .sidebar-panel.open{
            transform:translateX(0);
            opacity:1;
        }
        .hud-btn{
            background:linear-gradient(145deg,#2c2418,#1f1a10);
            border:1px solid #c8aa6e;
            width:36px;
            height:36px;
            border-radius:50%;
            font-size:18px;
            cursor:pointer;
            color:#f0d89e;
            box-shadow:0 2px 6px black;
            transition:0.05s linear;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .hud-btn:active{transform:scale(0.92);background:#3a2e1e;}
        
        .character-selector{
            display:flex;
            gap:6px;
            margin-top:4px;
            justify-content:center;
        }
        .char-btn{
            background:#2a2418;
            border:1px solid #b89a6a;
            padding:4px 8px;
            border-radius:24px;
            font-size:12px;
            color:#f7d86c;
            cursor:pointer;
            text-align:center;
            font-weight:bold;
        }
        .char-btn.active{
            background:#c8aa4e;
            color:#1a1508;
            border-color:#ffdf99;
        }
        
        .joystick-area{
            position:fixed;
            bottom:20px;
            left:20px;
            width:130px;
            height:130px;
            z-index:300;
            touch-action:none;
        }
        .joystick-base{
            position:absolute;
            inset:0;
            background:rgba(10,10,20,0.6);
            border-radius:50%;
            border:2px solid rgba(210,180,100,0.5);
            backdrop-filter:blur(8px);
        }
        .joystick-knob{
            position:absolute;
            width:54px;
            height:54px;
            background:radial-gradient(circle at 35% 35%,#cbb86e,#7a5c2e);
            border-radius:50%;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            box-shadow:0 0 8px #ffd966;
            transition:transform 0.05s linear;
            pointer-events:none;
            border:1px solid #efcd7e;
        }
        .action-buttons{
            position:fixed;
            bottom:20px;
            right:20px;
            z-index:250;
            display:flex;
            gap:12px;
            align-items:center;
        }
        .action-btn{
            width:58px;
            height:58px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:26px;
            cursor:pointer;
            box-shadow:0 2px 16px rgba(0,0,0,0.5);
            backdrop-filter:blur(6px);
            transition:0.05s linear;
            border:2px solid rgba(255,255,200,0.7);
        }
        .action-btn:active{transform:scale(0.92);}
        .btn-magic-left{background:rgba(50,100,200,0.9);border-color:#6a9aff;color:#fff;font-size:24px;}
        .btn-fire-right{background:rgba(220,80,10,0.88);border-color:#ff6020;color:#fff;}
        
        .map-overlay{
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            width:340px;
            height:340px;
            background:rgba(0,0,0,0.82);
            border:2px solid rgba(255,200,80,0.55);
            border-radius:12px;
            backdrop-filter:blur(4px);
            z-index:500;
            display:none;
            flex-direction:column;
            pointer-events:auto;
            box-shadow:0 0 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,0,0,0.5);
        }
        .map-header{
            background:transparent;
            padding:6px;
            text-align:center;
            color:rgba(255,210,80,0.8);
            font-weight:bold;
            font-size:11px;
            letter-spacing:3px;
            text-transform:uppercase;
            border-bottom:1px solid rgba(255,200,80,0.2);
        }
        .map-canvas-container{
            flex:1;
            padding:8px;
        }
        canvas#miniMapCanvas{
            width:100%;
            height:100%;
            background:transparent;
            border-radius:6px;
            display:block;
        }
        .map-close{
            position:absolute;
            top:-10px;
            right:-10px;
            width:26px;
            height:26px;
            background:rgba(100,30,10,0.9);
            border-radius:50%;
            text-align:center;
            line-height:24px;
            font-size:12px;
            font-weight:bold;
            color:rgba(255,200,100,0.9);
            cursor:pointer;
            border:1px solid rgba(255,180,60,0.5);
        }
        
        .death-screen{
            position:fixed;
            inset:0;
            background:#0a0000dd;
            z-index:1000;
            display:flex;
            align-items:center;
            justify-content:center;
            flex-direction:column;
            color:#e0b84c;
            font-size:32px;
            backdrop-filter:blur(10px);
            gap:20px;
            font-weight:bold;
        }
        .restart-btn{
            background:#a5652a;
            border:none;
            padding:12px 32px;
            font-size:24px;
            border-radius:60px;
            color:white;
            cursor:pointer;
        }
        .hide{display:none;}
        
        @media (max-width:700px){
            .orb{width:50px;height:50px;}
            .action-btn{width:48px;height:48px;font-size:22px;}
            .joystick-area{width:110px;height:110px;}
            .joystick-knob{width:44px;height:44px;}
            .hud-btn{width:32px;height:32px;font-size:16px;}
            .zoom-btn, .menu-toggle-btn{width:32px;height:32px;font-size:18px;}
            .char-btn{font-size:10px; padding:2px 6px;}
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="diablo-hud">
        <div class="orb" id="health-orb"><div class="orb-inner" id="health-fill" style="height:100%;"></div></div>
        <div class="orb orb-mana" id="mana-orb"><div class="orb-inner" id="mana-fill" style="height:100%;"></div></div>
    </div>
    
    <div class="sidebar-menu" id="sidebar-menu">
        <div class="sidebar-top-row">
            <div class="zoom-btn" id="zoom-in-btn">+</div>
            <div class="zoom-btn" id="zoom-out-btn">−</div>
            <div class="menu-toggle-btn" id="menu-toggle-btn">☰</div>
        </div>
        <div class="sidebar-panel" id="sidebar-panel">
            <div class="character-selector">
                <div id="char-paladin" class="char-btn active">⚔️ Paladín</div>
                <div id="cam-toggle-btn" class="char-btn">👁️ Cámara</div>
            </div>
            <button class="hud-btn" id="inventory-btn" title="Inventario">🎒</button>
            <button class="hud-btn" id="menu-btn" title="Menú">⚙️</button>
            <button class="hud-btn" id="map-btn" title="Mapa">🗺️</button>
        </div>
    </div>
    
    <div class="joystick-area" id="joystick-area"><div class="joystick-base"></div><div class="joystick-knob" id="joystick-knob"></div></div>
    <div class="action-buttons"><div class="action-btn btn-magic-left" id="magic-btn">✨</div><div class="action-btn btn-fire-right" id="firecone-btn">🔥</div></div>
    
    <div id="mapOverlay" class="map-overlay">
        <div class="map-header" id="map-header-title">— MAZMORRA —</div>
        <div class="map-canvas-container"><canvas id="miniMapCanvas" width="310" height="310"></canvas></div>
        <div class="map-close" id="closeMapBtn">✖</div>
    </div>
    
    <div class="death-screen hide" id="death-overlay"><div>💀 HAS MUERTO 💀</div><button class="restart-btn" id="restart-btn">REINICIAR AVENTURA</button></div>

    <script>
        (function(){
            const canvas = document.getElementById('gameCanvas');
            const engine = new BABYLON.Engine(canvas, true);
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.02, 0.02, 0.04, 1);
            
            // ILUMINACIÓN MEJORADA
            scene.fogMode = BABYLON.Scene.FOGMODE_LINEAR;
            scene.fogStart = 8;
            scene.fogEnd = 35;
            scene.fogColor = new BABYLON.Color3(0.05, 0.05, 0.08);
            
            const ambLight = new BABYLON.HemisphericLight('amb', new BABYLON.Vector3(0, 1, 0), scene);
            ambLight.intensity = 0.25;
            
            const dirLight = new BABYLON.DirectionalLight('dir', new BABYLON.Vector3(-1, -1.2, -0.7), scene);
            dirLight.intensity = 0.85;
            dirLight.position = new BABYLON.Vector3(20, 30, 15);
            dirLight.diffuse = new BABYLON.Color3(1, 0.9, 0.75);
            dirLight.specular = new BABYLON.Color3(0.25, 0.2, 0.1);
            
            const shadowGen = new BABYLON.ShadowGenerator(1024, dirLight);
            shadowGen.useBlurExponentialShadowMap = true;
            shadowGen.blurKernel = 6;
            shadowGen.bias = 0.0005;
            
            const cam = new BABYLON.FreeCamera('cam', new BABYLON.Vector3(0, 12, 16), scene);
            scene.activeCamera = cam;
            
            // Jugador y estado
            let player = null;
            let playerVisualRoot = null;
            let currentAnimGroups = [];
            let playerIsMoving = false;
            
            let playerHealth = 100;
            let maxHealth = 100;
            let currentMana = 100;
            let maxMana = 100;
            let baseDamage = 24;
            let armor = 5;
            let gold = 0;
            let currentDepth = 1;
            let gameActive = true;
            let enemies = [];
            let chests = [];
            let currentDungeonRoot = null;
            let currentRooms = [];
            let currentMapData = null;
            
            let joystickActive = false;
            let joystickVector = {x:0, y:0};
            let keyState = {ArrowUp:false,ArrowDown:false,ArrowLeft:false,ArrowRight:false,w:false,s:false,a:false,d:false};
            let isoZoom = 1.0;
            let moveSpeed = 9.5;
            
            let camMode = 'third';
            let camAzimuth = Math.PI * 0.25;
            let camPitch = 0.0;
            const CAM_BASE_RADIUS = 16.5;
            const CAM_BASE_HEIGHT = 11.8;
            let camCurrentRadius = CAM_BASE_RADIUS;
            let camCurrentHeight = CAM_BASE_HEIGHT;
            
            const PALADIN_URL = 'paladin.glb';
            let currentCharacter = 'paladin';
            let isPlayingCombo = false;
            
            function _playAnim(name, loop, onEnd){
                if(!currentAnimGroups.length) return;
                currentAnimGroups.forEach(ag=>{ try{ ag.stop(); }catch(e){} });
                const ag = currentAnimGroups.find(a=>a.name.toLowerCase().includes(name.toLowerCase())) || currentAnimGroups[0];
                try{
                    ag.start(loop, 1.0, ag.from, ag.to, false);
                    if(onEnd){
                        const obs = ag.onAnimationGroupEndObservable.addOnce(()=>{ onEnd(); });
                    }
                }catch(e){}
            }
            
            function playComboAttack(){
                if(!currentAnimGroups.length || isPlayingCombo) return;
                isPlayingCombo = true;
                _playAnim('combo', false, ()=>{
                    isPlayingCombo = false;
                    _playAnim('idle', true);
                });
            }
            
            function loadVisualModel(url, callback) {
                while(playerVisualRoot.getChildren().length > 0){
                    const child = playerVisualRoot.getChildren()[0];
                    if(child) child.dispose();
                }
                currentAnimGroups = [];
                BABYLON.SceneLoader.ImportMesh('', '', url, scene, (meshes, _ps, _sk, animationGroups) => {
                    if(!player || player.isDisposed()) { if(callback) callback(false); return; }
                    currentAnimGroups = animationGroups || [];
                    const root = new BABYLON.TransformNode('char_visual', scene);
                    root.parent = playerVisualRoot;
                    currentAnimGroups.forEach(ag => {
                        ag.targetedAnimations.forEach(ta => {
                            const tgtName = (ta.target && ta.target.name) ? ta.target.name.toLowerCase() : '';
                            const propName = (ta.animation && ta.animation.targetProperty) ? ta.animation.targetProperty.toLowerCase() : '';
                            const isRoot = tgtName.includes('hips') || tgtName === '__root__' || tgtName === 'root';
                            if(isRoot && (propName.includes('position') || propName === 'position')){
                                ta.animation.setKeys([{frame: ag.from, value: BABYLON.Vector3.Zero()}, {frame: ag.to, value: BABYLON.Vector3.Zero()}]);
                            }
                        });
                    });
                    const targetHeight = 2.8;
                    let minY = Infinity, maxY = -Infinity;
                    meshes.forEach(m => {
                        if(m.getBoundingInfo){
                            try {
                                const bi = m.getBoundingInfo();
                                if(bi.boundingBox.minimum.y < minY) minY = bi.boundingBox.minimum.y;
                                if(bi.boundingBox.maximum.y > maxY) maxY = bi.boundingBox.maximum.y;
                            } catch(e){}
                        }
                    });
                    if(isFinite(minY) && isFinite(maxY) && (maxY - minY) > 0.01){
                        const modelHeight = maxY - minY;
                        const scale = targetHeight / modelHeight;
                        root.scaling.setAll(scale);
                        root.position.y = (-minY * scale) + 0.35;
                    } else {
                        root.scaling.setAll(0.022);
                        root.position.y = 0.05;
                    }
                    root.rotation.y = 0;
                    meshes.forEach(m => {
                        m.parent = root;
                        m.isPickable = false;
                        m.checkCollisions = false;
                        shadowGen.addShadowCaster(m);
                    });
                    player.isVisible = false;
                    if(currentAnimGroups.length) _playAnim('idle', true);
                    if(callback) callback(true);
                }, null, (err) => {
                    console.error("Error cargando modelo:", url, err);
                    if(callback) callback(false);
                });
            }
            
            function createPlayerCapsule() {
                if(player) player.dispose();
                player = BABYLON.MeshBuilder.CreateCapsule('player', {height:1.8, radius:0.45, tessellation:12}, scene);
                player.position.set(0,0.9,0);
                player.checkCollisions = true;
                player.isPickable = false;
                player.isVisible = false;
                shadowGen.addShadowCaster(player);
                if(playerVisualRoot) playerVisualRoot.dispose();
                playerVisualRoot = new BABYLON.TransformNode('player_visual_root', scene);
                playerVisualRoot.parent = player;
                playerVisualRoot.position.y = 0;
            }
            
            function initPlayer() {
                createPlayerCapsule();
                loadVisualModel(PALADIN_URL, () => { loadLevel(1); });
            }
            
            function updateUI(){
                const healthFill = document.getElementById('health-fill');
                const manaFill = document.getElementById('mana-fill');
                healthFill.style.height = (playerHealth/maxHealth*100)+'%';
                manaFill.style.height = (currentMana/maxMana*100)+'%';
                const alive = enemies.filter(e=>e.alive).length;
                if(alive===0 && gameActive && currentDungeonRoot && currentDepth<16) nextLevel();
                const mapHeader = document.getElementById('map-header-title');
                if(mapHeader) mapHeader.innerText = `— MAZMORRA - NIVEL ${currentDepth} —`;
            }
            function nextLevel(){ if(currentDepth<16){ currentDepth++; loadLevel(currentDepth); } }
            
            function createExplosion(pos, color1, color2){
                const ps = new BABYLON.ParticleSystem("exp", 30, scene);
                ps.particleTexture = new BABYLON.Texture("https://assets.babylonjs.com/textures/particle.png", scene);
                ps.emitter = pos;
                ps.minEmitBox = new BABYLON.Vector3(-0.3,-0.2,-0.3);
                ps.maxEmitBox = new BABYLON.Vector3(0.3,0.3,0.3);
                ps.color1 = color1;
                ps.color2 = color2;
                ps.colorDead = new BABYLON.Color4(0,0,0,0);
                ps.minSize = 0.1;
                ps.maxSize = 0.3;
                ps.minLifeTime = 0.2;
                ps.maxLifeTime = 0.5;
                ps.emitRate = 80;
                ps.direction1 = new BABYLON.Vector3(-0.6,-0.2,-0.6);
                ps.direction2 = new BABYLON.Vector3(0.6,0.8,0.6);
                ps.start();
                setTimeout(()=>ps.dispose(), 500);
            }
            
            function castAreaMagic(){
                if(!gameActive || !player) return;
                if(currentMana < 30) return;
                currentMana -= 30;
                updateUI();
                const center = player.position.clone();
                center.y += 1.0;
                const sphere = BABYLON.MeshBuilder.CreateSphere("magic", {diameter:0.5, segments:16}, scene);
                sphere.position.copyFrom(center);
                const mat = new BABYLON.StandardMaterial("magicMat", scene);
                mat.diffuseColor = new BABYLON.Color3(0.2,0.5,1);
                mat.emissiveColor = new BABYLON.Color3(0.1,0.3,0.9);
                mat.alpha = 0.7;
                sphere.material = mat;
                let scale = 0.5;
                const obs = scene.onBeforeRenderObservable.add(() => {
                    scale += 0.15;
                    sphere.scaling.setAll(scale);
                    if(scale >= 5.0){
                        sphere.dispose();
                        scene.onBeforeRenderObservable.remove(obs);
                    }
                });
                for(let i=0;i<5;i++) createExplosion(center, new BABYLON.Color4(0.3,0.6,1,1), new BABYLON.Color4(0.1,0.2,0.8,1));
                for(let e of enemies){
                    if(!e.alive) continue;
                    if(BABYLON.Vector3.Distance(center, e.mesh.position) < 5.0){
                        e.health -= 55;
                        if(e.health<=0){
                            if(e.mesh) e.mesh.dispose();
                            e.alive = false;
                            dropLoot(center);
                        }
                        if(e.roomId !== undefined){
                            for(let other of enemies){
                                if(other.roomId === e.roomId && other !== e && other.alive && !other.aggroed) other.aggroed = true;
                            }
                        }
                    }
                }
                updateUI();
            }
            
            function fireCone(){
                if(!gameActive || !player) return;
                const angle = player.rotation.y;
                const forward = new BABYLON.Vector3(Math.sin(angle), 0, Math.cos(angle)).normalize();
                const origin = player.position.clone();
                origin.y += 1.0;
                for(let i=0;i<4;i++) createExplosion(origin.add(forward.scale(1.5)), new BABYLON.Color4(1,0.5,0.1,1), new BABYLON.Color4(1,0.2,0,1));
                const coneRadius = 6.8;
                const coneDotMin = 0.28;
                let hitCount = 0;
                for(let e of enemies){
                    if(!e.alive) continue;
                    const toEnemy = e.mesh.position.subtract(origin);
                    const dist = toEnemy.length();
                    if(dist > coneRadius) continue;
                    const dot = BABYLON.Vector3.Dot(forward, toEnemy.normalize());
                    if(dot > coneDotMin){
                        e.health -= 48;
                        if(e.health<=0){
                            if(e.mesh) e.mesh.dispose();
                            e.alive = false;
                            dropLoot(e.mesh.position.clone());
                        }
                        hitCount++;
                        if(e.roomId !== undefined){
                            for(let other of enemies){
                                if(other.roomId === e.roomId && other !== e && other.alive && !other.aggroed) other.aggroed = true;
                            }
                        }
                    }
                }
                if(hitCount > 0){
                    const blastCenter = origin.add(forward.scale(2.0));
                    for(let i=0;i<3;i++) createExplosion(blastCenter, new BABYLON.Color4(1,0.3,0,1), new BABYLON.Color4(1,0.6,0,1));
                }
                updateUI();
            }
            
            function dropLoot(pos){
                const r = Math.random();
                if(r < 0.4) gold += 10 + Math.floor(Math.random()*15) + currentDepth*2;
                else if(r < 0.65) baseDamage += 3;
                else if(r < 0.85) armor += 2;
                else currentMana = Math.min(maxMana, currentMana + 40);
                updateUI();
            }
            
            // ========== GENERACIÓN ONE-PAGE DUNGEON CON HABITACIONES GRANDES Y SUELO EXTERIOR BLANCO ==========
            function mkRng(seed){ let s=seed>>>0; return ()=>{ s+=0x6D2B79F5; let t=s; t=Math.imul(t^t>>>15,t|1); t^=t+Math.imul(t^t>>>7,t|61); return ((t^t>>>14)>>>0)/4294967296; }; }
            
            function addWallTorchToSegment(posX, posZ, normalX, normalZ, parent, yOff=1.9){
                const group = new BABYLON.TransformNode("torch_"+Math.random(), scene);
                group.position.set(posX, yOff, posZ);
                group.parent = parent;

            function generateDungeon(levelSeed, mapSize, nRooms, wallH, wallT) {
                const rng = mkRng(levelSeed);
                const cellSz = 1.35;
                const grid = Array.from({ length: mapSize }, () => new Uint8Array(mapSize));
                const rooms = [];

                function isAreaFree(x, y, w, h, extraPadding = 1) {
                    if (x < extraPadding || y < extraPadding || x + w > mapSize - extraPadding || y + h > mapSize - extraPadding) return false;
                    for (let gy = y - extraPadding; gy <= y + h + extraPadding; gy++) {
                        for (let gx = x - extraPadding; gx <= x + w + extraPadding; gx++) {
                            if (grid[gy] && grid[gy][gx] !== 0) return false;
                        }
                    }
                    return true;
                }

                // Habitación central inicial (DOBLE de tamaño: entre 8x8 y 12x12)
                let rw = 8 + Math.floor(rng() * 5), rh = 8 + Math.floor(rng() * 5);
                let rx = Math.floor(mapSize / 2 - rw / 2), ry = Math.floor(mapSize / 2 - rh / 2);
                rooms.push({ x: rx, y: ry, w: rw, h: rh });
                for (let gy = ry; gy < ry + rh; gy++) for (let gx = rx; gx < rx + rw; gx++) grid[gy][gx] = 1;

                // Añadir habitaciones grandes (mínimo 8x8)
                for (let i = 0; i < nRooms; i++) {
                    let added = false;
                    for (let tries = 0; tries < 40; tries++) {
                        const parent = rooms[Math.floor(rng() * rooms.length)];
                        const side = Math.floor(rng() * 4);
                        let nw = 8 + Math.floor(rng() * 5), nh = 8 + Math.floor(rng() * 5);
                        let nx, ny, px, py;
                        if (side === 0) { // arriba
                            nx = parent.x + Math.floor(rng() * (parent.w - nw));
                            ny = parent.y - nh - 3;
                            px = parent.x + Math.floor(parent.w / 2);
                            py = parent.y - 1;
                        } else if (side === 1) { // derecha
                            nx = parent.x + parent.w + 3;
                            ny = parent.y + Math.floor(rng() * (parent.h - nh));
                            px = parent.x + parent.w;
                            py = parent.y + Math.floor(parent.h / 2);
                        } else if (side === 2) { // abajo
                            nx = parent.x + Math.floor(rng() * (parent.w - nw));
                            ny = parent.y + parent.h + 3;
                            px = parent.x + Math.floor(parent.w / 2);
                            py = parent.y + parent.h;
                        } else { // izquierda
                            nx = parent.x - nw - 3;
                            ny = parent.y + Math.floor(rng() * (parent.h - nh));
                            px = parent.x - 1;
                            py = parent.y + Math.floor(parent.h / 2);
                        }
                        if (isAreaFree(nx, ny, nw, nh, 1)) {
                            for (let gy = ny; gy < ny + nh; gy++) for (let gx = nx; gx < nx + nw; gx++) grid[gy][gx] = 1;
                            // Pasillo ancho (3 celdas de ancho - mantenemos el mismo ancho que tenías)
                            let endX = nx + Math.floor(nw / 2);
                            let endY = ny + Math.floor(nh / 2);
                            let startX = px, startY = py;
                            let steps = Math.max(Math.abs(endX - startX), Math.abs(endY - startY));
                            for (let s = 0; s <= steps; s++) {
                                let tx = startX + Math.round((endX - startX) * s / steps);
                                let ty = startY + Math.round((endY - startY) * s / steps);
                                for (let offX = -1; offX <= 1; offX++) {
                                    for (let offY = -1; offY <= 1; offY++) {
                                        if (Math.abs(offX) + Math.abs(offY) <= 1) {
                                            let gx = tx + offX, gy = ty + offY;
                                            if (gx >= 0 && gx < mapSize && gy >= 0 && gy < mapSize && grid[gy][gx] === 0) {
                                                grid[gy][gx] = 2;
                                            }
                                        }
                                    }
                                }
                            }
                            rooms.push({ x: nx, y: ny, w: nw, h: nh });
                            added = true; break;
                        }
                    }
                    if (!added && i === 0) break;
                }

                // Construcción visual con muros y antorchas
                const rootNode = new BABYLON.TransformNode("dungeon_root", scene);
                const wallTex = new BABYLON.Texture("https://i.ibb.co/rR8f8QWg/Copilot-20260501-175332.png", scene);
                const floorTexInt = new BABYLON.Texture("https://i.ibb.co/prdbDwrj/Copilot-20260501-170824.png", scene);
                const floorTexExt = new BABYLON.Texture("https://i.ibb.co/BHkzLgFQ/None-001-Diffuse.png", scene); // Suelo exterior blanco
                const wallMat = new BABYLON.StandardMaterial("wall", scene); wallMat.diffuseTexture = wallTex;
                const floorMatInt = new BABYLON.StandardMaterial("fint", scene); floorMatInt.diffuseTexture = floorTexInt;
                const floorMatExt = new BABYLON.StandardMaterial("fext", scene); floorMatExt.diffuseTexture = floorTexExt;
                const offX = -(mapSize * cellSz) / 2, offZ = -(mapSize * cellSz) / 2;

                // Crear suelo exterior en toda el área (blanco)
                for (let gy = 0; gy < mapSize; gy++) {
                    for (let gx = 0; gx < mapSize; gx++) {
                        const isInterior = (grid[gy] && grid[gy][gx] > 0);
                        const mat = isInterior ? floorMatInt : floorMatExt;
                        const tile = BABYLON.MeshBuilder.CreateGround(`tile_${gx}_${gy}`, { width: cellSz - 0.02, height: cellSz - 0.02 }, scene);
                        tile.position.set(offX + gx * cellSz, 0, offZ + gy * cellSz);
                        tile.material = mat;
                        tile.parent = rootNode;
                        tile.receiveShadows = true;
                    }
                }

                // Construir paredes solo alrededor de las áreas interiores
                for (let y = 1; y < mapSize - 1; y++) {
                    for (let x = 1; x < mapSize - 1; x++) {
                        if (grid[y][x] > 0) {
                            const neighbors = [[0,1],[0,-1],[1,0],[-1,0]];
                            neighbors.forEach(n => {
                                if (grid[y + n[1]][x + n[0]] === 0) {
                                    const wall = BABYLON.MeshBuilder.CreateBox("w", { width: cellSz, height: wallH, depth: 0.28 }, scene);
                                    wall.position.set(offX + x * cellSz + n[0] * cellSz/2, wallH/2, offZ + y * cellSz + n[1] * cellSz/2);
                                    if (n[0] !== 0) wall.rotation.y = Math.PI / 2;
                                    wall.material = wallMat;
                                    wall.parent = rootNode;
                                    wall.checkCollisions = true;
                                    shadowGen.addShadowCaster(wall);
                                    if (rng() < 0.18) addWallTorchToSegment(wall.position.x, wall.position.z, (n[0] === 0 ? -n[1] : n[0]), (n[0] === 0 ? -n[1] : n[0]), rootNode, 1.9);
                                }
                            });
                        }
                    }
                }

                // Añadir cofres en habitaciones grandes
                rooms.forEach(r => {
                    if (r.w >= 6 && r.h >= 6) {
                        const cx = offX + (r.x + r.w/2) * cellSz;
                        const cz = offZ + (r.y + r.h/2) * cellSz;
                        const chestGroup = new BABYLON.TransformNode("ch", scene);
                        chestGroup.position.set(cx + (Math.random()-0.5)*r.w*0.5*cellSz, 0.1, cz + (Math.random()-0.5)*r.h*0.5*cellSz);
                        chestGroup.parent = rootNode;
                        const box = BABYLON.MeshBuilder.CreateBox("chest", {width:0.8, height:0.6, depth:0.6}, scene);
                        box.parent = chestGroup; box.position.y=0.3;
                        const wood = new BABYLON.StandardMaterial("wood", scene);
                        wood.diffuseColor = new BABYLON.Color3(0.7,0.45,0.25);
                        box.material = wood;
                        chests.push({ mesh: chestGroup, value: 30+currentDepth*5, opened: false });
                    }
                });
                return { rootNode, rooms, cellSz, offX, offZ };
            }
            
            function clearDungeon(){ if(currentDungeonRoot) currentDungeonRoot.dispose(); enemies.forEach(e=>{ try{ if(e.mesh) e.mesh.dispose(); }catch(e){} }); chests.forEach(c=>{ try{ c.mesh.dispose(); }catch(e){} }); enemies = []; chests = []; }
            const ORC_URLS = [{ root: "./", file: "orc_warrior.glb" }];
            function spawnEnemies(rooms, cellSz, offX, offZ, level, startPos){ const enemyList=[]; const roomsToSpawn=rooms.slice(1); const count=Math.min(roomsToSpawn.length*(1+Math.floor(level/3)),22); for(let i=0;i<count;i++){ const room=roomsToSpawn[Math.floor(Math.random()*roomsToSpawn.length)]; let x=offX+(room.x+room.w/2+(Math.random()-0.5)*room.w*0.6)*cellSz, z=offZ+(room.y+room.h/2+(Math.random()-0.5)*room.h*0.6)*cellSz; const tempMesh=BABYLON.MeshBuilder.CreateCylinder(`temp_${i}`,{height:1.4,diameter:0.85},scene); tempMesh.position.set(x,0.7,z); tempMesh.material=new BABYLON.StandardMaterial("temp",scene); tempMesh.material.diffuseColor=new BABYLON.Color3(0.5,0.3,0.1); tempMesh.checkCollisions=true; shadowGen.addShadowCaster(tempMesh); const hp=35+level*3; const dmg=5+Math.floor(level/2); const spd=6+level*0.2; const enemyData={mesh:tempMesh,health:hp,alive:true,damage:dmg,speed:spd,attackCd:0,visionRange:14,roomId:roomsToSpawn.indexOf(room),aggroed:false,loadedModel:false}; enemyList.push(enemyData); function tryLoadOrc(idx){ if(idx>=ORC_URLS.length)return; BABYLON.SceneLoader.ImportMesh("",ORC_URLS[idx].root,ORC_URLS[idx].file,scene,(meshes)=>{ if(!enemyData.alive){meshes.forEach(m=>m.dispose());return;} const oldPos=enemyData.mesh.position.clone(); enemyData.mesh.dispose(); const root=new BABYLON.TransformNode("orc_root",scene); root.position.copyFrom(oldPos); root.scaling.setAll(0.55); meshes.forEach(m=>{m.parent=root; shadowGen.addShadowCaster(m);}); const collider=BABYLON.MeshBuilder.CreateCapsule("coll",{height:1.3,radius:0.45},scene); collider.isVisible=false; collider.parent=root; collider.position.y=0.65; collider.checkCollisions=true; enemyData.mesh=root; enemyData.loadedModel=true; },null,()=>tryLoadOrc(idx+1)); } tryLoadOrc(0); } return enemyList; }
            function loadLevel(level){ if(!gameActive || level>16) return; clearDungeon(); const seed=4242+level*137+Math.floor(Math.random()*10000); const mapSize=52, nRooms=6+Math.min(level,6); const {rootNode,rooms,cellSz,offX,offZ}=generateDungeon(seed,mapSize,nRooms,4.2,0.45); currentDungeonRoot=rootNode; currentRooms=rooms; currentMapData={offX,offZ,cellSz,rooms}; const start=rooms[0]; const startPos={x:offX+(start.x+start.w/2)*cellSz, z:offZ+(start.y+start.h/2)*cellSz}; enemies=spawnEnemies(rooms,cellSz,offX,offZ,level,startPos); if(player) player.position.set(startPos.x,0.9,startPos.z); updateUI(); if(document.getElementById('mapOverlay').style.display==='flex') updateMapOverlay(); }
            
            function openChest(chest){ if(chest.opened) return; chest.opened=true; gold+=chest.value; updateUI(); chest.mesh.dispose(); chests=chests.filter(c=>c!==chest); }
            function applyDamageToPlayer(dmg){ if(!gameActive) return; const mitigated=Math.max(1,dmg-Math.floor(armor/3)); playerHealth-=mitigated; updateUI(); if(playerHealth<=0){ playerHealth=0; gameActive=false; document.getElementById('death-overlay').classList.remove('hide'); } }
            function updateEnemies(dt){ for(let e of enemies){ if(!e.alive||!e.mesh) continue; const dist=BABYLON.Vector3.Distance(player.position,e.mesh.position); if(e.aggroed||dist<e.visionRange){ e.aggroed=true; if(e.attackCd>0) e.attackCd-=dt; if(dist<1.2&&e.attackCd<=0){ applyDamageToPlayer(e.damage); e.attackCd=0.85; } else if(dist>1.3){ const dir=player.position.subtract(e.mesh.position).normalize(); e.mesh.moveWithCollisions(dir.scale(e.speed*dt)); e.mesh.position.y=0.7; const yaw=Math.atan2(dir.x,dir.z); let diff=yaw-e.mesh.rotation.y; while(diff>Math.PI) diff-=2*Math.PI; while(diff<-Math.PI) diff+=2*Math.PI; e.mesh.rotation.y+=diff*0.18; } } } enemies=enemies.filter(e=>e.alive); updateUI(); }
            function checkChests(){ for(let i=0;i<chests.length;i++){ const c=chests[i]; if(BABYLON.Vector3.Distance(player.position,c.mesh.position)<1.5 && !c.opened){ openChest(c); i--; } } }
            
            function updateMovement(dt){
                if(!gameActive||!player) return;
                let jx=0, jz=0;
                if(joystickActive && (Math.abs(joystickVector.x)>0.1 || Math.abs(joystickVector.y)>0.1)){
                    jx = -joystickVector.x;   jz = joystickVector.y;
                } else {
                    const f = (keyState.ArrowUp||keyState.w)?1:(keyState.ArrowDown||keyState.s)?-1:0;
                    const s = (keyState.ArrowRight||keyState.d)?1:(keyState.ArrowLeft||keyState.a)?-1:0;
                    jx = s; jz = f;
                }
                if(jx!==0 || jz!==0){
                    const forward = new BABYLON.Vector3(Math.sin(camAzimuth),0,Math.cos(camAzimuth)).normalize();
                    const right = new BABYLON.Vector3(Math.cos(camAzimuth),0,-Math.sin(camAzimuth)).normalize();
                    const moveVec = right.scale(jx).add(forward.scale(jz)).scale(moveSpeed*dt);
                    player.moveWithCollisions(moveVec);
                    player.position.y=0.9;
                    const targetYaw = Math.atan2(moveVec.x,moveVec.z);
                    let diff=targetYaw - player.rotation.y;
                    while(diff>Math.PI) diff-=2*Math.PI;
                    while(diff<-Math.PI) diff+=2*Math.PI;
                    player.rotation.y += diff*0.25;
                    if(!playerIsMoving){ playerIsMoving=true; if(currentAnimGroups.length&&!isPlayingCombo) _playAnim('walk',true); }
                } else {
                    if(playerIsMoving){ playerIsMoving=false; if(currentAnimGroups.length&&!isPlayingCombo) _playAnim('idle',true); }
                }
                if(camMode==='first'){
                    const eyeHeight=1.55;
                    const eyeX=player.position.x+Math.sin(camAzimuth)*0.1;
                    const eyeZ=player.position.z+Math.cos(camAzimuth)*0.1;
                    cam.position.set(eyeX,player.position.y+eyeHeight,eyeZ);
                    const lookX=eyeX+Math.sin(camAzimuth)*Math.cos(camPitch);
                    const lookY=player.position.y+eyeHeight+Math.sin(camPitch);
                    const lookZ=eyeZ+Math.cos(camAzimuth)*Math.cos(camPitch);
                    cam.setTarget(new BABYLON.Vector3(lookX,lookY,lookZ));
                    playerVisualRoot.setEnabled(false);
                } else {
                    playerVisualRoot.setEnabled(true);
                    camCurrentRadius=CAM_BASE_RADIUS*isoZoom;
                    camCurrentHeight=CAM_BASE_HEIGHT*isoZoom;
                    cam.position.set(player.position.x+Math.sin(camAzimuth)*camCurrentRadius,player.position.y+camCurrentHeight,player.position.z+Math.cos(camAzimuth)*camCurrentRadius);
                    cam.setTarget(player.position);
                }
                if(document.getElementById('mapOverlay').style.display==='flex') updateMapOverlay();
            }
            
            function drawMap(rooms, offX, offZ, cellSz, playerPos){ const mapCanvas=document.getElementById('miniMapCanvas'); const ctx=mapCanvas.getContext('2d'); const size=310; mapCanvas.width=size; mapCanvas.height=size; ctx.clearRect(0,0,size,size); ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,size,size); if(!rooms) return; let minX=Infinity,minZ=Infinity,maxX=-Infinity,maxZ=-Infinity; rooms.forEach(r=>{ minX=Math.min(minX,offX+r.x*cellSz); maxX=Math.max(maxX,offX+(r.x+r.w)*cellSz); minZ=Math.min(minZ,offZ+r.y*cellSz); maxZ=Math.max(maxZ,offZ+(r.y+r.h)*cellSz); }); const rangeX=maxX-minX, rangeZ=maxZ-minZ; const sc=Math.min((size-30)/rangeX,(size-30)/rangeZ)*0.88; const ox=(size-rangeX*sc)/2, oz=(size-rangeZ*sc)/2; function toIso(wx,wz){ const sx=ox+(wx-minX)*sc, sz=oz+(wz-minZ)*sc; const ix=(sx-sz)*0.7+size*0.5-(ox-oz)*0.7; const iy=(sx+sz)*0.35+size*0.13-(ox+oz)*0.35; return [ix,iy]; } rooms.forEach(r=>{ const x1=offX+r.x*cellSz,z1=offZ+r.y*cellSz, x2=offX+(r.x+r.w)*cellSz,z2=offZ+(r.y+r.h)*cellSz; const [ax,ay]=toIso(x1,z1),[bx,by]=toIso(x2,z1),[cx,cy]=toIso(x2,z2),[dx,dy]=toIso(x1,z2); ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.lineTo(cx,cy); ctx.lineTo(dx,dy); ctx.closePath(); ctx.fillStyle='rgba(20,12,5,0.55)'; ctx.fill(); ctx.strokeStyle='rgba(255,210,60,0.75)'; ctx.stroke(); }); if(playerPos){ const [px,py]=toIso(playerPos.x,playerPos.z); ctx.save(); ctx.translate(px,py); ctx.strokeStyle='#ffe040'; ctx.fillStyle='#fff200'; ctx.shadowBlur=6; ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(5,0); ctx.moveTo(0,-5); ctx.lineTo(0,5); ctx.stroke(); ctx.beginPath(); ctx.arc(0,0,2.5,0,Math.PI*2); ctx.fill(); ctx.restore(); } }

            const mapOverlayDiv=document.getElementById('mapOverlay'); document.getElementById('map-btn').onclick=()=>{ if(mapOverlayDiv.style.display==='flex') mapOverlayDiv.style.display='none'; else { mapOverlayDiv.style.display='flex'; updateMapOverlay(); } };
            document.getElementById('closeMapBtn').onclick=()=>mapOverlayDiv.style.display='none';
            canvas.addEventListener('pointerdown',e=>{ if(!gameActive) return; const pick=scene.pick(e.clientX,e.clientY,m=>enemies.some(en=>en.mesh===m)||chests.some(c=>c.mesh===m)); if(pick.hit){ if(enemies.some(en=>en.mesh===pick.pickedMesh)){ const enemy=enemies.find(en=>en.mesh===pick.pickedMesh); if(enemy&&enemy.alive){ enemy.health-=baseDamage; if(enemy.health<=0){ if(enemy.mesh) enemy.mesh.dispose(); enemy.alive=false; dropLoot(enemy.mesh.position.clone()); } enemy.aggroed=true; } } else if(chests.some(c=>c.mesh===pick.pickedMesh)){ const chest=chests.find(c=>c.mesh===pick.pickedMesh); if(chest&&!chest.opened) openChest(chest); } } });
            function restartGame(){ gameActive=true; playerHealth=maxHealth; currentMana=maxMana; baseDamage=24; armor=5; gold=0; currentDepth=1; camAzimuth=Math.PI*0.25; updateUI(); loadLevel(1); document.getElementById('death-overlay').classList.add('hide'); mapOverlayDiv.style.display='none'; }
            document.getElementById('restart-btn').onclick=restartGame;
            document.getElementById('cam-toggle-btn').onclick=()=>{ camMode=camMode==='third'?'first':'third'; document.getElementById('cam-toggle-btn').textContent=camMode==='first'?'👁️ 1ª persona':'👁️ Cámara'; };
            window.addEventListener('keydown',e=>{ if(e.key==='v'||e.key==='V') camMode=camMode==='third'?'first':'third'; });
            let mouseDown=false,lastMouseX=0,lastMouseY=0;
            canvas.addEventListener('mousedown',e=>{ mouseDown=true; lastMouseX=e.clientX; lastMouseY=e.clientY; });
            canvas.addEventListener('mouseup',()=>mouseDown=false);
            canvas.addEventListener('mousemove',e=>{ if(mouseDown&&gameActive){ const dx=e.clientX-lastMouseX, dy=e.clientY-lastMouseY; camAzimuth+=dx*0.005; if(camMode==='first') camPitch=Math.max(-0.6,Math.min(0.6,camPitch-dy*0.004)); lastMouseX=e.clientX; lastMouseY=e.clientY; } });
            let lastTime=performance.now();
            scene.onBeforeRenderObservable.add(()=>{ const now=performance.now(); let dt=Math.min(0.033,(now-lastTime)/1000); lastTime=now; if(gameActive&&player){ updateMovement(dt); updateEnemies(dt); checkChests(); } });
            initPlayer();
            engine.runRenderLoop(()=>scene.render());
            window.addEventListener('resize',()=>engine.resize());
        })();
    </script>
</body>
</html>
