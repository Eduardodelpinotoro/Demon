<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Diablo RPG - Suelos corregidos | Magia bola expansiva</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
        body{background:#050508;overflow:hidden;font-family:'Segoe UI',system-ui;touch-action:none;}
        canvas{width:100%!important;height:100%!important;outline:none;}
        .diablo-hud{position:fixed;bottom:30px;left:0;right:0;display:flex;justify-content:center;align-items:flex-end;gap:40px;z-index:250;pointer-events:none;}
        .orb{width:70px;height:70px;border-radius:50%;background:#2a1a1a;border:3px solid #b89a6a;box-shadow:0 0 15px rgba(0,0,0,0.5);position:relative;overflow:hidden;backdrop-filter:blur(4px);}
        .orb-inner{position:absolute;bottom:0;left:0;right:0;background:#c0392b;transition:height 0.2s;height:100%;}
        .orb-mana .orb-inner{background:#2980b9;}
        .orb-label{position:absolute;bottom:-25px;left:0;right:0;text-align:center;font-size:11px;font-weight:bold;color:#f2e6c9;text-shadow:1px 1px 0 #000;}
        .zoom-controls{position:fixed;top:16px;right:16px;z-index:260;display:flex;gap:8px;}
        .zoom-btn{background:rgba(30,25,45,0.85);backdrop-filter:blur(8px);border:1px solid #c8aa4e;width:36px;height:36px;border-radius:30px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;color:#f7d86c;cursor:pointer;box-shadow:0 2px 8px black;transition:0.1s;}
        .zoom-btn:active{transform:scale(0.92);}
        .joystick-area{position:fixed;bottom:20px;left:20px;width:130px;height:130px;z-index:300;touch-action:none;}
        .joystick-base{position:absolute;inset:0;background:rgba(10,10,20,0.6);border-radius:50%;border:2px solid rgba(210,180,100,0.5);backdrop-filter:blur(8px);}
        .joystick-knob{position:absolute;width:54px;height:54px;background:radial-gradient(circle at 35% 35%,#cbb86e,#7a5c2e);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px #ffd966;transition:transform 0.05s linear;pointer-events:none;border:1px solid #efcd7e;}
        .action-buttons{position:fixed;bottom:20px;right:20px;z-index:250;display:flex;gap:12px;align-items:center;}
        .action-btn{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;box-shadow:0 2px 16px rgba(0,0,0,0.5);backdrop-filter:blur(6px);transition:0.05s linear;border:2px solid rgba(255,255,200,0.7);}
        .action-btn:active{transform:scale(0.92);}
        .btn-magic-left{background:rgba(50,100,200,0.9);border-color:#6a9aff;color:#fff;font-size:24px;}
        .btn-fire-right{background:rgba(220,80,10,0.88);border-color:#ff6020;color:#fff;}
        .instruction{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:#211c11aa;color:#dbc983;font-size:9px;padding:2px 10px;border-radius:40px;pointer-events:none;white-space:nowrap;z-index:280;}
        .death-screen{position:fixed;inset:0;background:#0a0000dd;z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#e0b84c;font-size:32px;backdrop-filter:blur(10px);gap:20px;font-weight:bold;}
        .restart-btn{background:#a5652a;border:none;padding:12px 32px;font-size:24px;border-radius:60px;color:white;cursor:pointer;}
        .hide{display:none;}
        @media (max-width:700px){.orb{width:55px;height:55px;}.action-btn{width:48px;height:48px;font-size:22px;}.joystick-area{width:110px;height:110px;}.joystick-knob{width:44px;height:44px;}}
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="diablo-hud">
        <div class="orb" id="health-orb"><div class="orb-inner" id="health-fill" style="height:100%;"></div><div class="orb-label">VIDA</div></div>
        <div class="orb orb-mana" id="mana-orb"><div class="orb-inner" id="mana-fill" style="height:100%;"></div><div class="orb-label">MANÁ</div></div>
    </div>
    <div class="zoom-controls"><div class="zoom-btn" id="zoom-in-btn">+</div><div class="zoom-btn" id="zoom-out-btn">−</div></div>
    <div class="joystick-area" id="joystick-area"><div class="joystick-base"></div><div class="joystick-knob" id="joystick-knob"></div></div>
    <div class="action-buttons"><div class="action-btn btn-magic-left" id="magic-btn">✨</div><div class="action-btn btn-fire-right" id="firecone-btn">🔥</div></div>
    <div class="instruction">🎮 Joystick | ✨ Magia área (bola) | 🔥 Cono de fuego</div>
    <div class="death-screen hide" id="death-overlay"><div>💀 HAS MUERTO 💀</div><button class="restart-btn" id="restart-btn">REINICIAR AVENTURA</button></div>

    <script>
        (function(){
            // Silenciar mensajes
            window.showMessage = function(){};
            const canvas = document.getElementById('gameCanvas');
            const engine = new BABYLON.Engine(canvas, true);
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.02,0.02,0.04,1);
            scene.fogMode = BABYLON.Scene.FOGMODE_LINEAR;
            scene.fogStart = 8;
            scene.fogEnd = 35;
            scene.fogColor = new BABYLON.Color3(0.05,0.05,0.08);
            
            const ambLight = new BABYLON.HemisphericLight('amb', new BABYLON.Vector3(0,1,0), scene);
            ambLight.intensity = 0.25;
            const dirLight = new BABYLON.DirectionalLight('dir', new BABYLON.Vector3(-1,-1.2,-0.7), scene);
            dirLight.intensity = 0.8;
            dirLight.position = new BABYLON.Vector3(20,30,15);
            const shadowGen = new BABYLON.ShadowGenerator(1024, dirLight);
            shadowGen.useBlurExponentialShadowMap = true;
            shadowGen.blurKernel = 8;
            
            const cam = new BABYLON.FreeCamera('cam', new BABYLON.Vector3(10,12,10), scene);
            cam.setTarget(BABYLON.Vector3.Zero());
            scene.activeCamera = cam;
            
            // Jugador
            let player = null;
            let playerHealth = 100;
            let maxHealth = 100;
            let currentMana = 100;
            let maxMana = 100;
            let baseDamage = 24;
            let armor = 5;
            let gold = 0;
            let currentDepth = 1;
            let gameActive = true;
            let enemies = [];
            let chests = [];
            let currentDungeonRoot = null;
            let currentRooms = [];
            
            let joystickActive = false;
            let joystickVector = {x:0,y:0};
            let keyState = {ArrowUp:false,ArrowDown:false,ArrowLeft:false,ArrowRight:false,w:false,s:false,a:false,d:false};
            let isoZoom = 1.0;
            let moveSpeed = 9.5;
            
            const healthFill = document.getElementById('health-fill');
            const manaFill = document.getElementById('mana-fill');
            function updateUI(){
                healthFill.style.height = (playerHealth/maxHealth*100)+'%';
                manaFill.style.height = (currentMana/maxMana*100)+'%';
                const alive = enemies.filter(e=>e.alive).length;
                if(alive===0 && gameActive && currentDungeonRoot && currentDepth<16) nextLevel();
            }
            function nextLevel(){ if(currentDepth<16){ currentDepth++; loadLevel(currentDepth); } }
            
            const HVGIRL_URL = 'https://assets.babylonjs.com/meshes/HVGirl.glb';
            function createPlayer(){
                if(player) player.dispose();
                player = BABYLON.MeshBuilder.CreateCapsule('player', {height:1.8, radius:0.45, tessellation:12}, scene);
                player.position.set(0,0.9,0);
                player.checkCollisions = true;
                player.isPickable = false;
                player.isVisible = false;
                shadowGen.addShadowCaster(player);
                BABYLON.SceneLoader.ImportMesh('', '', HVGIRL_URL, scene, (meshes) => {
                    if(!player || player.isDisposed()) return;
                    const root = new BABYLON.TransformNode('hvg_root', scene);
                    root.parent = player;
                    root.scaling.setAll(0.001);
                    root.rotation.x = Math.PI/2;
                    root.position.y = -0.9;
                    meshes.forEach(m => { m.parent = root; m.isPickable = false; });
                }, null, ()=>{} );
            }
            
            function createExplosion(pos, color1, color2){
                const ps = new BABYLON.ParticleSystem("exp", 30, scene);
                ps.particleTexture = new BABYLON.Texture("https://assets.babylonjs.com/textures/particle.png", scene);
                ps.emitter = pos;
                ps.minEmitBox = new BABYLON.Vector3(-0.3,-0.2,-0.3);
                ps.maxEmitBox = new BABYLON.Vector3(0.3,0.3,0.3);
                ps.color1 = color1;
                ps.color2 = color2;
                ps.colorDead = new BABYLON.Color4(0,0,0,0);
                ps.minSize = 0.1;
                ps.maxSize = 0.3;
                ps.minLifeTime = 0.2;
                ps.maxLifeTime = 0.5;
                ps.emitRate = 80;
                ps.direction1 = new BABYLON.Vector3(-0.6,-0.2,-0.6);
                ps.direction2 = new BABYLON.Vector3(0.6,0.8,0.6);
                ps.start();
                setTimeout(()=>ps.dispose(), 500);
            }
            
            // Bola de magia expansiva (simple, sin lag)
            function castAreaMagic(){
                if(!gameActive || !player) return;
                if(currentMana < 30) return;
                currentMana -= 30;
                updateUI();
                const center = player.position.clone();
                center.y += 1.0;
                const sphere = BABYLON.MeshBuilder.CreateSphere("magic", {diameter:0.5, segments:16}, scene);
                sphere.position.copyFrom(center);
                const mat = new BABYLON.StandardMaterial("magicMat", scene);
                mat.diffuseColor = new BABYLON.Color3(0.2,0.5,1);
                mat.emissiveColor = new BABYLON.Color3(0.1,0.3,0.9);
                mat.alpha = 0.7;
                sphere.material = mat;
                let scale = 0.5;
                const obs = scene.onBeforeRenderObservable.add(() => {
                    scale += 0.15;
                    sphere.scaling.setAll(scale);
                    if(scale >= 5.0){
                        sphere.dispose();
                        scene.onBeforeRenderObservable.remove(obs);
                    }
                });
                for(let i=0;i<5;i++) createExplosion(center, new BABYLON.Color4(0.3,0.6,1,1), new BABYLON.Color4(0.1,0.2,0.8,1));
                for(let e of enemies){
                    if(!e.alive) continue;
                    if(BABYLON.Vector3.Distance(center, e.mesh.position) < 5.0){
                        e.health -= 55;
                        if(e.health<=0){
                            e.mesh.dispose();
                            e.alive = false;
                            dropLoot(e.mesh.position.clone());
                        }
                        if(e.roomId !== undefined){
                            for(let other of enemies){
                                if(other.roomId === e.roomId && other !== e && other.alive && !other.aggroed) other.aggroed = true;
                            }
                        }
                    }
                }
                updateUI();
            }
            
            function fireCone(){
                if(!gameActive || !player) return;
                const angle = player.rotation.y;
                const forward = new BABYLON.Vector3(Math.sin(angle), 0, Math.cos(angle)).normalize();
                const origin = player.position.clone();
                origin.y += 1.0;
                for(let i=0;i<2;i++) createExplosion(origin.add(forward.scale(1.2)), new BABYLON.Color4(1,0.6,0.1,1), new BABYLON.Color4(1,0.2,0,1));
                for(let e of enemies){
                    if(!e.alive) continue;
                    const toEnemy = e.mesh.position.subtract(origin);
                    const dist = toEnemy.length();
                    if(dist > 4.5) continue;
                    const dot = BABYLON.Vector3.Dot(forward, toEnemy.normalize());
                    if(dot > 0.5){
                        e.health -= 48;
                        if(e.health<=0){
                            e.mesh.dispose();
                            e.alive = false;
                            dropLoot(e.mesh.position.clone());
                        }
                        if(e.roomId !== undefined){
                            for(let other of enemies){
                                if(other.roomId === e.roomId && other !== e && other.alive && !other.aggroed) other.aggroed = true;
                            }
                        }
                    }
                }
                updateUI();
            }
            
            function dropLoot(pos){
                const r = Math.random();
                if(r < 0.4) gold += 10 + Math.floor(Math.random()*15) + currentDepth*2;
                else if(r < 0.65) baseDamage += 3;
                else if(r < 0.85) armor += 2;
                else currentMana = Math.min(maxMana, currentMana + 40);
                updateUI();
            }
            
            // ---------- GENERADOR DE MAZMORRA (SUELOS CORREGIDOS: interior piedra, exterior negro) ----------
            function mkRng(seed){
                let s = seed>>>0;
                return ()=>{ s+=0x6D2B79F5; let t=s; t=Math.imul(t^t>>>15,t|1); t^=t+Math.imul(t^t>>>7,t|61); return ((t^t>>>14)>>>0)/4294967296; };
            }
            
            function addCandelabro(x, z, parent){
                const group = new BABYLON.TransformNode("cand", scene);
                group.position.set(x,0,z);
                group.parent = parent;
                const metal = new BABYLON.StandardMaterial("metal", scene);
                metal.diffuseColor = new BABYLON.Color3(0.7,0.6,0.4);
                const pole = BABYLON.MeshBuilder.CreateCylinder("pole", {height:2.2, diameter:0.12, tessellation:6}, scene);
                pole.parent = group; pole.position.y=1.1; pole.material=metal;
                const base = BABYLON.MeshBuilder.CreateCylinder("base", {height:0.2, diameter:0.5, tessellation:8}, scene);
                base.parent = group; base.position.y=0.1; base.material=metal;
                for(let i=0;i<3;i++){
                    const ang = (i/3)*Math.PI*2;
                    const arm = BABYLON.MeshBuilder.CreateCylinder("arm", {height:0.5, diameter:0.07, tessellation:6}, scene);
                    arm.parent = group; arm.position.set(Math.cos(ang)*0.55,2.1,Math.sin(ang)*0.55); arm.rotation.z=Math.PI/3; arm.material=metal;
                    const candle = BABYLON.MeshBuilder.CreateCylinder("candle", {height:0.45, diameter:0.12, tessellation:8}, scene);
                    candle.parent = group; candle.position.set(Math.cos(ang)*0.75,2.4,Math.sin(ang)*0.75);
                    const flameMat = new BABYLON.StandardMaterial("flame", scene);
                    flameMat.diffuseColor = new BABYLON.Color3(1,0.5,0.1);
                    flameMat.emissiveColor = new BABYLON.Color3(0.8,0.2,0);
                    candle.material = flameMat;
                    const light = new BABYLON.PointLight("cand_light", new BABYLON.Vector3(x+Math.cos(ang)*0.75, 2.6, z+Math.sin(ang)*0.75), scene);
                    light.intensity = 0.9;
                    light.diffuse = new BABYLON.Color3(1,0.4,0.1);
                    light.range = 5;
                    let t = Math.random()*100;
                    scene.onBeforeRenderObservable.add(()=>{ t+=engine.getDeltaTime()/1000; light.intensity = 0.6 + Math.sin(t*14)*0.2 + Math.sin(t*8)*0.1; });
                }
            }
            
            function generateDungeon(levelSeed, mapSize, nRooms, wallH, wallT){
                const rng = mkRng(levelSeed);
                const cellSz = 1.45;
                // BSP (misma lógica funcional de siempre)
                function bspSplit(node, rng, minSize, depth){
                    if(depth<=0 || node.w<minSize*2.2 || node.h<minSize*2.2){ node.leaf=true; return; }
                    const horizontal = node.w/node.h < 1.1 ? true : (node.h/node.w < 1.1 ? false : rng()<0.5);
                    if(horizontal){
                        const split = Math.floor(minSize + rng()*(node.h-minSize*2));
                        node.a = { x:node.x, y:node.y, w:node.w, h:split };
                        node.b = { x:node.x, y:node.y+split, w:node.w, h:node.h-split };
                    } else {
                        const split = Math.floor(minSize + rng()*(node.w-minSize*2));
                        node.a = { x:node.x, y:node.y, w:split, h:node.h };
                        node.b = { x:node.x+split, y:node.y, w:node.w-split, h:node.h };
                    }
                    bspSplit(node.a, rng, minSize, depth-1);
                    bspSplit(node.b, rng, minSize, depth-1);
                }
                function bspLeaves(node, out){ if(node.leaf){ out.push(node); return; } if(node.a) bspLeaves(node.a, out); if(node.b) bspLeaves(node.b, out); }
                function bspRooms(leaves, rng, padding){
                    return leaves.map(l=>{
                        const px = padding + Math.floor(rng()*padding*0.8);
                        const py = padding + Math.floor(rng()*padding*0.8);
                        let w = Math.max(4, l.w - px*2 - Math.floor(rng()*3));
                        let h = Math.max(4, l.h - py*2 - Math.floor(rng()*3));
                        if(rng()<0.3){ w = Math.min(l.w-2, w+3); h = Math.min(l.h-2, h+3); }
                        if(rng()<0.2){ w = Math.max(3, w-2); h = Math.max(3, h-2); }
                        return { x:l.x+px, y:l.y+py, w, h };
                    });
                }
                function connectRooms(rooms, rng){
                    const corridors=[];
                    const sorted=[...rooms].sort((a,b)=>(a.x+a.w/2)-(b.x+b.w/2));
                    for(let i=0;i<sorted.length-1;i++){
                        const a=sorted[i], b=sorted[i+1];
                        const ax=Math.floor(a.x+a.w/2), ay=Math.floor(a.y+a.h/2);
                        const bx=Math.floor(b.x+b.w/2), by=Math.floor(b.y+b.h/2);
                        if(rng()<0.5){
                            corridors.push({x1:ax,y1:ay,x2:bx,y2:ay,w:2});
                            corridors.push({x1:bx,y1:ay,x2:bx,y2:by,w:2});
                        } else {
                            corridors.push({x1:ax,y1:ay,x2:ax,y2:by,w:2});
                            corridors.push({x1:ax,y1:by,x2:bx,y2:by,w:2});
                        }
                    }
                    return corridors;
                }
                function rasterise(size, rooms, corridors){
                    const grid = Array.from({length:size},()=>new Uint8Array(size));
                    rooms.forEach(r=>{
                        for(let gy=r.y; gy<r.y+r.h; gy++)
                            for(let gx=r.x; gx<r.x+r.w; gx++)
                                if(gy>=0&&gy<size&&gx>=0&&gx<size) grid[gy][gx]=1;
                    });
                    corridors.forEach(c=>{
                        const hw=Math.floor(c.w/2);
                        const x1=Math.min(c.x1,c.x2), x2=Math.max(c.x1,c.x2);
                        const y1=Math.min(c.y1,c.y2), y2=Math.max(c.y1,c.y2);
                        for(let gy=y1-hw; gy<=y2+hw; gy++)
                            for(let gx=x1-hw; gx<=x2+hw; gx++)
                                if(gy>=0&&gy<size&&gx>=0&&gx<size && !grid[gy][gx]) grid[gy][gx]=2;
                    });
                    return grid;
                }
                function findWallSegments(grid, size){
                    const isFloor=c=>c===1||c===2;
                    const segsH=[], segsV=[];
                    for(let gy=0; gy<size; gy++){
                        let run=null;
                        for(let gx=0; gx<=size; gx++){
                            const here = gx<size && !isFloor(grid[gy][gx]);
                            const adj = gx<size && ((gy>0&&isFloor(grid[gy-1][gx]))||(gy<size-1&&isFloor(grid[gy+1][gx])));
                            if(here && adj){ if(!run) run={x1:gx,y:gy,x2:gx}; else run.x2=gx; }
                            else if(run){ segsH.push(run); run=null; }
                        }
                    }
                    for(let gx=0; gx<size; gx++){
                        let run=null;
                        for(let gy=0; gy<=size; gy++){
                            const here = gy<size && !isFloor(grid[gy][gx]);
                            const adj = gy<size && ((gx>0&&isFloor(grid[gy][gx-1]))||(gx<size-1&&isFloor(grid[gy][gx+1])));
                            if(here && adj){ if(!run) run={y1:gy,x:gx,y2:gy}; else run.y2=gy; }
                            else if(run){ segsV.push(run); run=null; }
                        }
                    }
                    return {segsH, segsV};
                }
                
                const minRoom = Math.max(5, Math.floor(mapSize/nRooms*0.8));
                const root2d = {x:2,y:2,w:mapSize-4,h:mapSize-4};
                const depth = Math.ceil(Math.log2(nRooms))+1;
                bspSplit(root2d, rng, minRoom, depth);
                const leaves = [];
                bspLeaves(root2d, leaves);
                let rooms = bspRooms(leaves, rng, 2).slice(0, nRooms);
                const corridors = connectRooms(rooms, rng);
                const gridMap = rasterise(mapSize, rooms, corridors);
                const {segsH, segsV} = findWallSegments(gridMap, mapSize);
                
                const rootNode = new BABYLON.TransformNode("dungeon_root", scene);
                const allMeshes = [];
                const wallTex = new BABYLON.Texture("https://i.ibb.co/rR8f8QWg/Copilot-20260501-175332.png", scene);
                wallTex.uScale = 1.2; wallTex.vScale = 1.2;
                // TEXTURAS CORREGIDAS: interior usa textura de piedra, exterior usa textura negra
                const floorTexInterior = new BABYLON.Texture("https://i.ibb.co/prdbDwrj/Copilot-20260501-170824.png", scene);  // piedra (interior)
                floorTexInterior.uScale = 2.0; floorTexInterior.vScale = 2.0;
                const floorTexExterior = new BABYLON.Texture("https://i.ibb.co/BHkzLgFQ/None-001-Diffuse.png", scene); // negra (exterior)
                floorTexExterior.uScale = 2.0; floorTexExterior.vScale = 2.0;
                
                const wallMat = new BABYLON.StandardMaterial("wall", scene);
                wallMat.diffuseTexture = wallTex;
                const floorMatInt = new BABYLON.StandardMaterial("fint", scene);
                floorMatInt.diffuseTexture = floorTexInterior;
                const floorMatExt = new BABYLON.StandardMaterial("fext", scene);
                floorMatExt.diffuseTexture = floorTexExterior;
                
                function addWall(id, wx, wy, wz, len, height, depth, rotY){
                    const box = BABYLON.MeshBuilder.CreateBox(id, {width:len, height:height, depth:depth}, scene);
                    box.position.set(wx, wy, wz);
                    box.rotation.y = rotY;
                    box.material = wallMat;
                    box.parent = rootNode;
                    box.checkCollisions = true;
                    allMeshes.push(box);
                    shadowGen.addShadowCaster(box);
                }
                
                const total = (mapSize-2)*cellSz;
                const offX = -total/2;
                const offZ = -total/2;
                const adj = -0.05;
                segsH.forEach((seg,i)=>{
                    const len = (seg.x2-seg.x1+1)*cellSz - adj;
                    const wx = offX + (seg.x1+seg.x2)/2 * cellSz;
                    const wz = offZ + seg.y * cellSz;
                    addWall(`wh_${i}`, wx, wallH/2, wz, len, wallH, wallT*2, 0);
                });
                segsV.forEach((seg,i)=>{
                    const len = (seg.y2-seg.y1+1)*cellSz - adj;
                    const wz = offZ + (seg.y1+seg.y2)/2 * cellSz;
                    const wx = offX + seg.x * cellSz;
                    addWall(`wv_${i}`, wx, wallH/2, wz, wallT*2, wallH, len, 0);
                });
                
                // Suelos con la asignación correcta
                for(let gy=0; gy<mapSize; gy++){
                    for(let gx=0; gx<mapSize; gx++){
                        const isInterior = gridMap[gy] && gridMap[gy][gx] !== 0; // pasillo o habitación
                        const mat = isInterior ? floorMatInt : floorMatExt;
                        const tile = BABYLON.MeshBuilder.CreateGround(`f_${gx}_${gy}`, {width:cellSz-0.02, height:cellSz-0.02}, scene);
                        tile.position.set(offX + gx*cellSz, 0, offZ + gy*cellSz);
                        tile.material = mat;
                        tile.parent = rootNode;
                        tile.receiveShadows = true;
                        allMeshes.push(tile);
                    }
                }
                
                for(let r of rooms){
                    const cx = offX + (r.x + r.w/2) * cellSz;
                    const cz = offZ + (r.y + r.h/2) * cellSz;
                    if(r.w > 6 && r.h > 6){
                        addCandelabro(cx, cz, rootNode);
                        const chestGroup = new BABYLON.TransformNode("ch", scene);
                        chestGroup.position.set(cx + (Math.random()-0.5)*r.w*0.6*cellSz, 0.1, cz + (Math.random()-0.5)*r.h*0.6*cellSz);
                        chestGroup.parent = rootNode;
                        const box = BABYLON.MeshBuilder.CreateBox("chest", {width:0.8, height:0.6, depth:0.6}, scene);
                        box.parent = chestGroup; box.position.y=0.3;
                        const wood = new BABYLON.StandardMaterial("wood", scene);
                        wood.diffuseColor = new BABYLON.Color3(0.7,0.45,0.25);
                        box.material = wood;
                        chests.push({ mesh: chestGroup, value: 30+currentDepth*5, opened: false });
                        allMeshes.push(box);
                    }
                }
                return { rootNode, allMeshes, rooms, cellSz, wallH, offX, offZ };
            }
            
            function clearDungeon(){
                if(currentDungeonRoot) currentDungeonRoot.dispose();
                enemies.forEach(e=>{ try{ e.mesh.dispose(); }catch(e){} });
                chests.forEach(c=>{ try{ c.mesh.dispose(); }catch(e){} });
                enemies = []; chests = [];
            }
            
            const ORC_GLB_URL = "orc_warrior.glb"; // Cambia por la URL de tu modelo o déjalo así
            function spawnEnemies(rooms, cellSz, offX, offZ, level, startPos){
                const enemyList = [];
                const roomsToSpawn = rooms.slice(1);
                const count = Math.min(roomsToSpawn.length * (1 + Math.floor(level/3)), 20);
                for(let i=0;i<count;i++){
                    const room = roomsToSpawn[Math.floor(Math.random()*roomsToSpawn.length)];
                    let x = offX + (room.x + room.w/2 + (Math.random()-0.5)*room.w*0.6) * cellSz;
                    let z = offZ + (room.y + room.h/2 + (Math.random()-0.5)*room.h*0.6) * cellSz;
                    let dist = Math.hypot(x - startPos.x, z - startPos.z);
                    if(dist < 20){
                        let attempts=0;
                        while(dist<20 && attempts<10){
                            const other = roomsToSpawn[Math.floor(Math.random()*roomsToSpawn.length)];
                            x = offX + (other.x + other.w/2 + (Math.random()-0.5)*other.w*0.6) * cellSz;
                            z = offZ + (other.y + other.h/2 + (Math.random()-0.5)*other.h*0.6) * cellSz;
                            dist = Math.hypot(x - startPos.x, z - startPos.z);
                            attempts++;
                        }
                    }
                    // fallback cilindro
                    const tempMesh = BABYLON.MeshBuilder.CreateCylinder(`temp_orc_${i}`, {height:1.3, diameter:0.85, tessellation:8}, scene);
                    tempMesh.position.set(x, 0.65, z);
                    const tempMat = new BABYLON.StandardMaterial("temp_mat", scene);
                    tempMat.diffuseColor = new BABYLON.Color3(0.3,0.6,0.2);
                    tempMesh.material = tempMat;
                    tempMesh.checkCollisions = true;
                    tempMesh.isPickable = true;
                    shadowGen.addShadowCaster(tempMesh);
                    const health = 35 + level*3;
                    const damage = 5 + Math.floor(level/2);
                    const speed = 6.0 + level*0.2;
                    const roomId = roomsToSpawn.indexOf(room);
                    const enemyData = { mesh: tempMesh, health, alive:true, damage, speed, attackCd:0, visionRange:14, roomId, aggroed:false, loadedModel:false };
                    enemyList.push(enemyData);
                    // Intentar cargar GLB
                    BABYLON.SceneLoader.ImportMesh("", "", ORC_GLB_URL, scene, (meshes) => {
                        if(meshes && meshes.length && enemyData.alive){
                            const oldPos = enemyData.mesh.position.clone();
                            enemyData.mesh.dispose();
                            const root = new BABYLON.TransformNode("orc_root", scene);
                            root.position.copyFrom(oldPos);
                            root.scaling.setAll(0.8);
                            meshes.forEach(m => { m.parent = root; m.isPickable = true; m.checkCollisions = true; shadowGen.addShadowCaster(m); });
                            enemyData.mesh = root;
                            enemyData.loadedModel = true;
                        } else {
                            const mat = new BABYLON.StandardMaterial("orc_mat", scene);
                            mat.diffuseColor = new BABYLON.Color3(0.2,0.5,0.1);
                            enemyData.mesh.material = mat;
                        }
                    }, null, (sc, msg) => {
                        const mat = new BABYLON.StandardMaterial("orc_mat", scene);
                        mat.diffuseColor = new BABYLON.Color3(0.2,0.5,0.1);
                        enemyData.mesh.material = mat;
                    });
                }
                return enemyList;
            }
            
            function loadLevel(level){
                if(!gameActive) return;
                if(level>16) return;
                clearDungeon();
                const seed = 4242 + level*137 + Math.floor(Math.random()*10000);
                const mapSize = 68;
                const nRooms = 8 + Math.min(level,6);
                const wallH = 4.2;
                const wallT = 0.45;
                const { rootNode, rooms, cellSz, offX, offZ } = generateDungeon(seed, mapSize, nRooms, wallH, wallT);
                currentDungeonRoot = rootNode;
                currentRooms = rooms;
                const start = rooms[0];
                const startPos = { x: offX + (start.x+start.w/2)*cellSz, z: offZ + (start.y+start.h/2)*cellSz };
                enemies = spawnEnemies(rooms, cellSz, offX, offZ, level, startPos);
                if(player) player.position.set(startPos.x, 0.9, startPos.z);
                updateUI();
            }
            
            function openChest(chest){
                if(chest.opened) return;
                chest.opened = true;
                gold += chest.value;
                updateUI();
                chest.mesh.dispose();
                chests = chests.filter(c=>c!==chest);
            }
            
            function applyDamageToPlayer(dmg){
                if(!gameActive) return;
                const mitigated = Math.max(1, dmg - Math.floor(armor/3));
                playerHealth -= mitigated;
                updateUI();
                if(playerHealth <= 0){
                    playerHealth = 0;
                    gameActive = false;
                    document.getElementById('death-overlay').classList.remove('hide');
                }
            }
            
            function updateEnemies(dt){
                for(let i=0;i<enemies.length;i++){
                    const e = enemies[i];
                    if(!e.alive || !e.mesh) continue;
                    const distToPlayer = BABYLON.Vector3.Distance(player.position, e.mesh.position);
                    const inVision = distToPlayer < e.visionRange;
                    if(e.aggroed || inVision){
                        e.aggroed = true;
                        if(e.attackCd>0) e.attackCd -= dt;
                        if(distToPlayer < 1.1 && e.attackCd<=0){
                            applyDamageToPlayer(e.damage);
                            e.attackCd = 0.85;
                        } else if(distToPlayer > 1.2){
                            const dir = player.position.subtract(e.mesh.position).normalize();
                            const move = dir.scale(e.speed * dt);
                            e.mesh.moveWithCollisions(move);
                            e.mesh.position.y = 0.65;
                        }
                    }
                }
                enemies = enemies.filter(e=>e.alive);
                updateUI();
            }
            
            function checkChests(){
                for(let i=0;i<chests.length;i++){
                    const c = chests[i];
                    if(BABYLON.Vector3.Distance(player.position, c.mesh.position) < 1.5 && !c.opened){
                        openChest(c);
                        i--;
                    }
                }
            }
            
            function updateMovement(dt){
                if(!gameActive || !player) return;
                let mx=0, mz=0;
                if(joystickActive && (Math.abs(joystickVector.x)>0.1 || Math.abs(joystickVector.y)>0.1)){
                    mx = -joystickVector.x;
                    mz = -joystickVector.y;
                } else {
                    const f = (keyState.ArrowUp||keyState.w) ? 1 : (keyState.ArrowDown||keyState.s) ? -1 : 0;
                    const s = (keyState.ArrowRight||keyState.d) ? 1 : (keyState.ArrowLeft||keyState.a) ? -1 : 0;
                    mx = s; mz = f;
                }
                if(mx!==0 || mz!==0){
                    const len = Math.hypot(mx,mz);
                    mx/=len; mz/=len;
                    let forward = cam.getForwardRay().direction.clone();
                    let right = BABYLON.Vector3.Cross(forward, BABYLON.Vector3.Up()).normalize();
                    forward.y = 0; forward.normalize();
                    right.y = 0; right.normalize();
                    const moveDir = forward.scale(mz).add(right.scale(mx));
                    if(moveDir.length()>0.01){
                        const moveVec = moveDir.scale(moveSpeed * dt);
                        player.moveWithCollisions(moveVec);
                        player.rotation.y = Math.atan2(moveDir.x, moveDir.z);
                    }
                }
                const target = player.position;
                const offset = new BABYLON.Vector3(isoZoom * 9.0, isoZoom * 10.5, isoZoom * 9.0);
                cam.position = target.add(offset);
                cam.setTarget(target);
            }
            
            // Joystick
            const joyArea = document.getElementById('joystick-area');
            const knob = document.getElementById('joystick-knob');
            const joyRadius = 45;
            function updateJoystick(tx, ty){
                const rect = joyArea.getBoundingClientRect();
                const cx = rect.left + rect.width/2;
                const cy = rect.top + rect.height/2;
                let dx = tx - cx;
                let dy = ty - cy;
                const dist = Math.hypot(dx,dy);
                if(dist > joyRadius){ dx = dx * joyRadius / dist; dy = dy * joyRadius / dist; }
                knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joystickVector.x = dx / joyRadius;
                joystickVector.y = dy / joyRadius;
                joystickActive = true;
            }
            function resetJoystick(){ joystickActive=false; joystickVector={x:0,y:0}; knob.style.transform='translate(-50%,-50%)'; }
            joyArea.addEventListener('touchstart', (e)=>{ e.preventDefault(); const t=e.touches[0]; updateJoystick(t.clientX,t.clientY); });
            document.addEventListener('touchmove', (e)=>{ if(joystickActive) for(let t of e.touches) if(joyArea.contains(t.target)){ updateJoystick(t.clientX,t.clientY); e.preventDefault(); break; } });
            document.addEventListener('touchend', ()=>resetJoystick());
            window.addEventListener('keydown', (e)=>{ if(keyState.hasOwnProperty(e.key)){ keyState[e.key]=true; e.preventDefault(); } });
            window.addEventListener('keyup', (e)=>{ if(keyState.hasOwnProperty(e.key)) keyState[e.key]=false; });
            
            document.getElementById('zoom-in-btn').onclick = ()=>{ isoZoom = Math.max(0.55, isoZoom-0.12); };
            document.getElementById('zoom-out-btn').onclick = ()=>{ isoZoom = Math.min(1.8, isoZoom+0.12); };
            document.getElementById('magic-btn').onclick = ()=>castAreaMagic();
            document.getElementById('firecone-btn').onclick = ()=>fireCone();
            
            canvas.addEventListener('pointerdown', (e)=>{
                if(!gameActive) return;
                const pick = scene.pick(e.clientX, e.clientY, m=> enemies.some(en=>en.mesh===m) || chests.some(c=>c.mesh===m));
                if(pick.hit){
                    if(enemies.some(en=>en.mesh===pick.pickedMesh)){
                        const enemy = enemies.find(en=>en.mesh===pick.pickedMesh);
                        if(enemy && enemy.alive){
                            enemy.health -= baseDamage;
                            if(enemy.health<=0){
                                enemy.mesh.dispose();
                                enemy.alive = false;
                                dropLoot(enemy.mesh.position.clone());
                            }
                            enemy.aggroed = true;
                        }
                    } else if(chests.some(c=>c.mesh===pick.pickedMesh)){
                        const chest = chests.find(c=>c.mesh===pick.pickedMesh);
                        if(chest && !chest.opened) openChest(chest);
                    }
                }
            });
            
            function restartGame(){
                gameActive = true;
                playerHealth = maxHealth;
                currentMana = maxMana;
                baseDamage = 24;
                armor = 5;
                gold = 0;
                currentDepth = 1;
                updateUI();
                loadLevel(1);
                document.getElementById('death-overlay').classList.add('hide');
            }
            document.getElementById('restart-btn').onclick = restartGame;
            
            let lastTime = performance.now();
            scene.onBeforeRenderObservable.add(()=>{
                const now = performance.now();
                let dt = Math.min(0.033, (now-lastTime)/1000);
                lastTime = now;
                if(gameActive && player){
                    updateMovement(dt);
                    updateEnemies(dt);
                    checkChests();
                }
            });
            
            createPlayer();
            loadLevel(1);
            engine.runRenderLoop(()=> scene.render());
            window.addEventListener('resize', ()=> engine.resize());
        })();
    </script>
</body>
</html>
