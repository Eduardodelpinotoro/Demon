<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Diablo RPG - 16 Niveles | Corregido y Mejorado</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<style>
    *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
    body{background:#0a0a0f;overflow:hidden;font-family:'Segoe UI',system-ui;touch-action:none;}
    canvas{width:100%!important;height:100%!important;outline:none;}
    #hud{
        position:fixed;top:16px;left:16px;right:16px;
        background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);
        border-radius:32px;padding:8px 18px;
        display:flex;justify-content:space-between;align-items:center;
        z-index:200;border:1px solid #c8aa4e;font-weight:bold;
        text-shadow:1px 1px 0 #000;pointer-events:none;
        font-size:12px;color:#f2e6c9;
        flex-wrap:wrap;
        gap:6px;
    }
    .hud-stat{background:#1e1a14aa;padding:4px 10px;border-radius:40px;backdrop-filter:blur(4px);}
    .hud-stat span{color:#e0b84c;}
    #gold-text{color:#ffcc44;}
    #dmg-text{color:#ff8866;}
    #armor-text{color:#88aaff;}
    .control-panel{
        position:fixed;bottom:20px;right:16px;z-index:250;
        display:flex;flex-direction:column;gap:12px;align-items:flex-end;
    }
    .zoom-btn{
        background:rgba(30,25,45,0.85);backdrop-filter:blur(8px);
        border:1px solid #c8aa4e;width:48px;height:48px;border-radius:40px;
        display:flex;align-items:center;justify-content:center;
        font-size:28px;font-weight:bold;color:#f7d86c;cursor:pointer;
        box-shadow:0 4px 12px black;transition:0.1s;
    }
    .zoom-btn:active{transform:scale(0.92);background:#c8aa4e33;}
    .joystick-area{
        position:fixed;bottom:20px;left:20px;width:130px;height:130px;z-index:300;
        touch-action:none;
    }
    .joystick-base{
        position:absolute;inset:0;background:rgba(10,10,20,0.6);border-radius:50%;
        border:2px solid rgba(210,180,100,0.5);backdrop-filter:blur(8px);
    }
    .joystick-knob{
        position:absolute;width:54px;height:54px;
        background:radial-gradient(circle at 35% 35%,#cbb86e,#7a5c2e);
        border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);
        box-shadow:0 0 8px #ffd966;transition:transform 0.05s linear;
        pointer-events:none;border:1px solid #efcd7e;
    }
    .action-buttons{
        position:fixed;bottom:20px;right:80px;z-index:250;
        display:flex;gap:12px;align-items:center;
    }
    .action-btn{
        width:58px;height:58px;border-radius:50%;
        display:flex;align-items:center;justify-content:center;
        font-size:26px;cursor:pointer;box-shadow:0 2px 16px rgba(0,0,0,0.5);
        backdrop-filter:blur(6px);transition:0.05s linear;
        border:2px solid rgba(255,255,200,0.7);
    }
    .action-btn:active{transform:scale(0.92);}
    .btn-fire{background:rgba(220,80,10,0.88);border-color:#ff6020;color:#fff;}
    .btn-melee{background:rgba(100,70,150,0.9);border-color:#c0a0ff;color:#fff;font-size:24px;}
    .btn-use{background:rgba(40,120,200,0.88);border-color:#4090ff;color:#fff;font-size:22px;}
    #message-area{
        position:fixed;bottom:30%;left:0;right:0;text-align:center;z-index:280;
        pointer-events:none;font-size:20px;font-weight:bold;text-shadow:2px 2px 0 #000;
        color:#f5cc7a;background:rgba(0,0,0,0.5);width:fit-content;margin:auto;
        padding:6px 18px;border-radius:60px;backdrop-filter:blur(8px);
        white-space:nowrap;opacity:0;transition:opacity 0.2s;
    }
    .death-screen{
        position:fixed;inset:0;background:#0a0000dd;z-index:1000;
        display:flex;align-items:center;justify-content:center;
        flex-direction:column;color:#e0b84c;font-size:32px;
        backdrop-filter:blur(10px);gap:20px;font-weight:bold;
    }
    .restart-btn{background:#a5652a;border:none;padding:12px 32px;font-size:24px;border-radius:60px;color:white;cursor:pointer;}
    .hide{display:none;}
    .instruction{
        position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
        background:#211c11aa;color:#dbc983;font-size:10px;padding:2px 12px;
        border-radius:40px;pointer-events:none;white-space:nowrap;z-index:280;
    }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="hud">
    <div class="hud-stat">❤️ VIDA <span id="hp-text">100</span></div>
    <div class="hud-stat">🛡️ ARM <span id="armor-text">5</span></div>
    <div class="hud-stat">⚔️ DMG <span id="dmg-text">22</span></div>
    <div class="hud-stat">💰 ORO <span id="gold-text">0</span></div>
    <div class="hud-stat">🗡️ NIVEL <span id="depth-text">1</span>/16</div>
    <div class="hud-stat">👾 ENEM <span id="enemies-remaining">0</span></div>
</div>
<div class="control-panel">
    <div class="zoom-btn" id="zoom-in-btn">+</div>
    <div class="zoom-btn" id="zoom-out-btn">−</div>
</div>
<div class="joystick-area" id="joystick-area">
    <div class="joystick-base"></div>
    <div class="joystick-knob" id="joystick-knob"></div>
</div>
<div class="action-buttons">
    <div class="action-btn btn-melee" id="melee-btn">🗡️</div>
    <div class="action-btn btn-fire" id="fireball-btn">🔥</div>
    <div class="action-btn btn-use" id="use-btn">🚪</div>
</div>
<div id="message-area">⚔️ DERROTA ENEMIGOS ⚔️</div>
<div class="instruction">🎮 Joystick | 🗡️ Ataque | 🔥 Bola (dirección personaje) | 🚪 Usar portal</div>
<div id="death-overlay" class="death-screen hide">
    <div>💀 HAS MUERTO 💀</div>
    <button class="restart-btn" id="restart-btn">REINICIAR AVENTURA</button>
</div>

<script>
(function(){
    const canvas = document.getElementById('gameCanvas');
    const engine = new BABYLON.Engine(canvas, true);
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.04,0.04,0.06,1);
    scene.fogMode = BABYLON.Scene.FOGMODE_LINEAR;
    scene.fogStart = 15;
    scene.fogEnd = 60;
    scene.fogColor = new BABYLON.Color3(0.08,0.08,0.12);
    
    // Luces (oscuro para atmósfera)
    const ambL = new BABYLON.HemisphericLight('amb', new BABYLON.Vector3(0,1,0), scene);
    ambL.intensity = 0.55;
    ambL.diffuse = new BABYLON.Color3(0.45,0.4,0.55);
    const dirL = new BABYLON.DirectionalLight('sun', new BABYLON.Vector3(-1, -1.2, -0.7), scene);
    dirL.intensity = 1.2;
    dirL.position = new BABYLON.Vector3(25,35,20);
    const shadowGen = new BABYLON.ShadowGenerator(2048, dirL);
    shadowGen.useBlurExponentialShadowMap = true;
    shadowGen.blurKernel = 16;
    
    const cam = new BABYLON.FreeCamera('isoCam', new BABYLON.Vector3(12,14,12), scene);
    cam.setTarget(BABYLON.Vector3.Zero());
    scene.activeCamera = cam;
    
    // Jugador
    let player = null;
    let playerHealth = 100;
    let maxHealth = 100;
    let baseDamage = 22;
    let armor = 5;
    let gold = 0;
    let currentDepth = 1;
    let gameActive = true;
    let enemies = [];
    let items = [];
    let chests = [];
    let portal = null;
    let portalActive = false;
    let currentDungeonRoot = null;
    let currentRooms = [];
    
    let joystickActive = false;
    let joystickVector = {x:0,y:0};
    let keyState = {ArrowUp:false,ArrowDown:false,ArrowLeft:false,ArrowRight:false,w:false,s:false,a:false,d:false};
    let isoZoom = 1.0;
    let moveSpeed = 7.2;  // velocidad jugador
    
    // UI
    const hpSpan = document.getElementById('hp-text');
    const depthSpan = document.getElementById('depth-text');
    const enemiesSpan = document.getElementById('enemies-remaining');
    const goldSpan = document.getElementById('gold-text');
    const dmgSpan = document.getElementById('dmg-text');
    const armorSpan = document.getElementById('armor-text');
    const msgDiv = document.getElementById('message-area');
    
    function showMessage(txt, dur=1600){
        msgDiv.style.opacity='1';
        msgDiv.innerText=txt;
        setTimeout(()=>msgDiv.style.opacity='0',dur);
    }
    function updateUI(){
        hpSpan.innerText = Math.max(0,playerHealth);
        depthSpan.innerText = `${currentDepth}/16`;
        const alive = enemies.filter(e=>e.alive).length;
        enemiesSpan.innerText = alive;
        goldSpan.innerText = gold;
        dmgSpan.innerText = baseDamage;
        armorSpan.innerText = armor;
        if(alive===0 && !portalActive && gameActive && currentDungeonRoot && currentDepth<16){
            spawnPortal();
        }
        if(alive===0 && currentDepth>=16 && !portalActive){
            showMessage("🏆 ¡HAS COMPLETADO LA MAZMORRA! 🏆",4000);
        }
    }
    
    // Cargar HVGirl
    const HVGIRL_URL = 'https://assets.babylonjs.com/meshes/HVGirl.glb';
    function createPlayer(){
        if(player) player.dispose();
        player = BABYLON.MeshBuilder.CreateCapsule('player', {height:1.8, radius:0.45, tessellation:12}, scene);
        player.position.set(0,0.9,0);
        player.checkCollisions = true;
        player.isPickable = false;
        player.isVisible = false;
        shadowGen.addShadowCaster(player);
        
        BABYLON.SceneLoader.ImportMesh('', '', HVGIRL_URL, scene, (meshes, skeletons, animGroups) => {
            if(!player || player.isDisposed()) return;
            const root = new BABYLON.TransformNode('hvg_root', scene);
            root.parent = player;
            root.scaling.setAll(0.001);
            root.rotation.x = Math.PI/2;
            root.position.y = -0.9;
            meshes.forEach(m => { m.parent = root; m.isPickable = false; });
            if(animGroups && animGroups.length) animGroups[0].start(true);
            showMessage("🌟 HVGirl lista", 1200);
        }, null, (sc,msg)=>console.warn(msg));
    }
    
    // Bola de fuego con colisión mejorada
    let fireballs = [];
    const FIREBALL_SPEED = 24;
    function shootFireball(){
        if(!gameActive || !player) return;
        const origin = player.position.clone();
        origin.y += 1.2;
        const angle = player.rotation.y;
        const dir = new BABYLON.Vector3(Math.sin(angle), 0, Math.cos(angle)).normalize();
        const ball = BABYLON.MeshBuilder.CreateSphere('fb', {diameter:0.55, segments:12}, scene);
        ball.position.copyFrom(origin);
        const mat = new BABYLON.StandardMaterial('fb_mat', scene);
        mat.diffuseColor = new BABYLON.Color3(1,0.4,0.05);
        mat.emissiveColor = new BABYLON.Color3(1,0.2,0);
        ball.material = mat;
        const light = new BABYLON.PointLight('fb_light', origin, scene);
        light.intensity = 2.2;
        light.range = 7;
        fireballs.push({ball, light, dir, life:3.0, velocity: dir.clone().scale(FIREBALL_SPEED)});
        showMessage("🔥 BOLA DE FUEGO",500);
    }
    function updateFireballs(dt){
        for(let i=0;i<fireballs.length;i++){
            const fb = fireballs[i];
            fb.life -= dt;
            if(fb.life<=0){
                fb.ball.dispose(); fb.light.dispose();
                fireballs.splice(i,1); i--; continue;
            }
            const step = fb.velocity.clone().scale(dt);
            fb.ball.position.addInPlace(step);
            fb.light.position.copyFrom(fb.ball.position);
            // Detectar colisión con enemigos (radio aumentado)
            for(let j=0;j<enemies.length;j++){
                const e = enemies[j];
                if(!e.alive) continue;
                const distToEnemy = BABYLON.Vector3.Distance(fb.ball.position, e.mesh.position);
                if(distToEnemy < 1.0){  // radio de colisión más grande
                    e.health -= 42;
                    if(e.health<=0){
                        e.mesh.dispose();
                        e.alive = false;
                        dropLoot(e.mesh.position.clone());
                        showMessage("💀 ENEMIGO MUERTO",400);
                        updateUI();
                    } else showMessage(`🔥 42 daño`,300);
                    fb.ball.dispose(); fb.light.dispose();
                    fireballs.splice(i,1); i--; break;
                }
            }
        }
    }
    
    function dropLoot(pos){
        const roll = Math.random();
        if(roll < 0.6){
            const amount = 15 + Math.floor(Math.random()*25) + currentDepth*3;
            gold += amount;
            showMessage(`💰 +${amount} oro`,800);
            updateUI();
        } else if(roll < 0.8){
            baseDamage += 4;
            showMessage(`⚔️ Daño +4 (${baseDamage})`,1200);
            updateUI();
        } else {
            armor += 3;
            showMessage(`🛡️ Armadura +3 (${armor})`,1200);
            updateUI();
        }
    }
    
    function meleeAttack(){
        if(!gameActive || !player) return;
        let closest = null;
        let minDist = 2.2;
        for(let e of enemies){
            if(!e.alive) continue;
            const dist = BABYLON.Vector3.Distance(player.position, e.mesh.position);
            if(dist < minDist){
                minDist = dist;
                closest = e;
            }
        }
        if(closest){
            closest.health -= baseDamage;
            if(closest.health<=0){
                closest.mesh.dispose();
                closest.alive = false;
                dropLoot(closest.mesh.position.clone());
                showMessage("💀 ENEMIGO DERROTADO",500);
                updateUI();
            } else {
                showMessage(`⚔️ ${baseDamage} daño`,400);
                const push = closest.mesh.position.subtract(player.position).normalize().scale(0.6);
                closest.mesh.position.addInPlace(push);
            }
        } else showMessage("❌ No hay enemigos cerca",800);
    }
    
    // Acción: usar portal (sin puertas)
    function usePortal(){
        if(!gameActive || !player) return;
        if(portal && portalActive && BABYLON.Vector3.Distance(player.position, portal.position) < 2.8){
            const alive = enemies.filter(e=>e.alive).length;
            if(alive===0 && currentDepth<16){
                currentDepth++;
                showMessage(`⬇️ BAJANDO A NIVEL ${currentDepth}`,1500);
                loadLevel(currentDepth);
                return;
            } else if(alive===0 && currentDepth>=16){
                showMessage("🏆 ¡HAS CONQUISTADO LA MAZMORRA! 🏆",4000);
                return;
            } else {
                showMessage("❌ Derrota a todos los enemigos primero",1200);
                return;
            }
        } else {
            showMessage("❌ No hay portal cerca",1000);
        }
    }
    
    // --------------------------------------------------------------
    // GENERADOR DE MAZMORRA ALEATORIA (semilla diferente cada nivel y cada partida)
    // --------------------------------------------------------------
    function mkRng(seed){
        let s = seed>>>0;
        return ()=>{ s+=0x6D2B79F5; let t=s; t=Math.imul(t^t>>>15,t|1); t^=t+Math.imul(t^t>>>7,t|61); return ((t^t>>>14)>>>0)/4294967296; };
    }
    
    // Columnas simples
    function addColumn(x, z, root){
        const group = new BABYLON.TransformNode("col_"+Math.random(), scene);
        group.position.set(x,0,z);
        group.parent = root;
        const mat = new BABYLON.StandardMaterial("col_mat", scene);
        mat.diffuseColor = new BABYLON.Color3(0.5,0.45,0.55);
        const shaft = BABYLON.MeshBuilder.CreateCylinder("shaft", {height:2.8, diameter:0.55, tessellation:12}, scene);
        shaft.parent = group; shaft.position.y=1.4; shaft.material=mat;
        const base = BABYLON.MeshBuilder.CreateCylinder("base", {height:0.2, diameter:0.7, tessellation:12}, scene);
        base.parent = group; base.position.y=0.1; base.material=mat;
        const cap = BABYLON.MeshBuilder.CreateCylinder("cap", {height:0.2, diameterTop:0.65, diameterBottom:0.6, tessellation:12}, scene);
        cap.parent = group; cap.position.y=2.8; cap.material=mat;
        shadowGen.addShadowCaster(shaft);
    }
    
    // Candelabro con luz
    function addCandelabro(x, z, root){
        const group = new BABYLON.TransformNode("cand_"+Math.random(), scene);
        group.position.set(x,0,z);
        group.parent = root;
        const metal = new BABYLON.StandardMaterial("metal", scene);
        metal.diffuseColor = new BABYLON.Color3(0.8,0.6,0.2);
        const pole = BABYLON.MeshBuilder.CreateCylinder("pole", {height:2.4, diameter:0.12, tessellation:6}, scene);
        pole.parent = group; pole.position.y=1.2; pole.material=metal;
        const base = BABYLON.MeshBuilder.CreateCylinder("base", {height:0.2, diameter:0.5, tessellation:8}, scene);
        base.parent = group; base.position.y=0.1; base.material=metal;
        for(let i=0;i<3;i++){
            const ang = (i/3)*Math.PI*2;
            const arm = BABYLON.MeshBuilder.CreateCylinder("arm", {height:0.6, diameter:0.07, tessellation:6}, scene);
            arm.parent = group; arm.position.set(Math.cos(ang)*0.55,2.3,Math.sin(ang)*0.55); arm.rotation.z=Math.PI/3; arm.material=metal;
            const candle = BABYLON.MeshBuilder.CreateCylinder("candle", {height:0.5, diameter:0.12, tessellation:8}, scene);
            candle.parent = group; candle.position.set(Math.cos(ang)*0.75,2.6,Math.sin(ang)*0.75);
            candle.material = new BABYLON.StandardMaterial("candle_mat", scene);
            candle.material.diffuseColor = new BABYLON.Color3(0.96,0.92,0.88);
            const light = new BABYLON.PointLight("candle_light", new BABYLON.Vector3(x+Math.cos(ang)*0.75,2.9,z+Math.sin(ang)*0.75), scene);
            light.intensity = 0.9; light.diffuse = new BABYLON.Color3(1,0.5,0.2); light.range=5;
            let t=Math.random()*100;
            scene.onBeforeRenderObservable.add(()=>{ t+=engine.getDeltaTime()/1000; light.intensity = 0.65 + Math.sin(t*15)*0.2 + Math.sin(t*9)*0.1; });
        }
    }
    
    // Cofre visible
    function addChest(x, z, root, level){
        const group = new BABYLON.TransformNode("chest_"+Math.random(), scene);
        group.position.set(x,0.1,z);
        group.parent = root;
        const box = BABYLON.MeshBuilder.CreateBox("chest_box", {width:0.8, height:0.6, depth:0.6}, scene);
        box.parent = group; box.position.y=0.3;
        const wood = new BABYLON.StandardMaterial("wood", scene);
        wood.diffuseColor = new BABYLON.Color3(0.7,0.45,0.25);
        wood.specularColor = new BABYLON.Color3(0.2,0.1,0.05);
        box.material = wood;
        const lid = BABYLON.MeshBuilder.CreateBox("chest_lid", {width:0.82, height:0.1, depth:0.62}, scene);
        lid.parent = group; lid.position.y=0.65; lid.material=wood;
        group.isPickable = true;
        chests.push({ mesh: group, value: 50+level*10, opened: false, lid: lid });
        shadowGen.addShadowCaster(box);
        shadowGen.addShadowCaster(lid);
    }
    
    function generateDungeon(levelSeed, mapSize, nRooms, wallH, wallT){
        const rng = mkRng(levelSeed);
        const cellSz = 1.45;
        // BSP (código probado)
        function bspSplit(node, rng, minSize, depth){
            if(depth<=0 || node.w<minSize*2.2 || node.h<minSize*2.2){ node.leaf=true; return; }
            const horizontal = node.w/node.h < 1.1 ? true : (node.h/node.w < 1.1 ? false : rng()<0.5);
            if(horizontal){
                const split = Math.floor(minSize + rng()*(node.h-minSize*2));
                node.a = { x:node.x, y:node.y, w:node.w, h:split };
                node.b = { x:node.x, y:node.y+split, w:node.w, h:node.h-split };
            } else {
                const split = Math.floor(minSize + rng()*(node.w-minSize*2));
                node.a = { x:node.x, y:node.y, w:split, h:node.h };
                node.b = { x:node.x+split, y:node.y, w:node.w-split, h:node.h };
            }
            bspSplit(node.a, rng, minSize, depth-1);
            bspSplit(node.b, rng, minSize, depth-1);
        }
        function bspLeaves(node, out){ if(node.leaf){ out.push(node); return; } if(node.a) bspLeaves(node.a, out); if(node.b) bspLeaves(node.b, out); }
        function bspRooms(leaves, rng, padding){
            return leaves.map(l=>{
                const px = padding + Math.floor(rng()*padding*0.8);
                const py = padding + Math.floor(rng()*padding*0.8);
                let w = Math.max(4, l.w - px*2 - Math.floor(rng()*3));
                let h = Math.max(4, l.h - py*2 - Math.floor(rng()*3));
                if(rng()<0.3){ w = Math.min(l.w-2, w+3); h = Math.min(l.h-2, h+3); }
                if(rng()<0.2){ w = Math.max(3, w-2); h = Math.max(3, h-2); }
                return { x:l.x+px, y:l.y+py, w, h };
            });
        }
        function connectRooms(rooms, rng){
            const corridors=[];
            const sorted=[...rooms].sort((a,b)=>(a.x+a.w/2)-(b.x+b.w/2));
            for(let i=0;i<sorted.length-1;i++){
                const a=sorted[i], b=sorted[i+1];
                const ax=Math.floor(a.x+a.w/2), ay=Math.floor(a.y+a.h/2);
                const bx=Math.floor(b.x+b.w/2), by=Math.floor(b.y+b.h/2);
                if(rng()<0.5){
                    corridors.push({x1:ax,y1:ay,x2:bx,y2:ay,w:2});
                    corridors.push({x1:bx,y1:ay,x2:bx,y2:by,w:2});
                } else {
                    corridors.push({x1:ax,y1:ay,x2:ax,y2:by,w:2});
                    corridors.push({x1:ax,y1:by,x2:bx,y2:by,w:2});
                }
            }
            return corridors;
        }
        function rasterise(size, rooms, corridors){
            const grid = Array.from({length:size},()=>new Uint8Array(size));
            rooms.forEach(r=>{
                for(let gy=r.y;gy<r.y+r.h;gy++)
                    for(let gx=r.x;gx<r.x+r.w;gx++)
                        if(gy>=0&&gy<size&&gx>=0&&gx<size) grid[gy][gx]=1;
            });
            corridors.forEach(c=>{
                const hw=Math.floor(c.w/2);
                const x1=Math.min(c.x1,c.x2), x2=Math.max(c.x1,c.x2);
                const y1=Math.min(c.y1,c.y2), y2=Math.max(c.y1,c.y2);
                for(let gy=y1-hw;gy<=y2+hw;gy++)
                    for(let gx=x1-hw;gx<=x2+hw;gx++)
                        if(gy>=0&&gy<size&&gx>=0&&gx<size && !grid[gy][gx]) grid[gy][gx]=2;
            });
            return grid;
        }
        function findWallSegments(grid, size){
            const isFloor=c=>c===1||c===2;
            const segsH=[], segsV=[];
            for(let gy=0;gy<size;gy++){
                let run=null;
                for(let gx=0;gx<=size;gx++){
                    const here = gx<size && !isFloor(grid[gy][gx]);
                    const adj = gx<size && ((gy>0&&isFloor(grid[gy-1][gx]))||(gy<size-1&&isFloor(grid[gy+1][gx])));
                    if(here && adj){ if(!run) run={x1:gx,y:gy,x2:gx}; else run.x2=gx; }
                    else if(run){ segsH.push(run); run=null; }
                }
            }
            for(let gx=0;gx<size;gx++){
                let run=null;
                for(let gy=0;gy<=size;gy++){
                    const here = gy<size && !isFloor(grid[gy][gx]);
                    const adj = gy<size && ((gx>0&&isFloor(grid[gy][gx-1]))||(gx<size-1&&isFloor(grid[gy][gx+1])));
                    if(here && adj){ if(!run) run={y1:gy,x:gx,y2:gy}; else run.y2=gy; }
                    else if(run){ segsV.push(run); run=null; }
                }
            }
            return {segsH, segsV};
        }
        
        const minRoom = Math.max(5, Math.floor(mapSize/nRooms*0.8));
        const root2d = {x:2,y:2,w:mapSize-4,h:mapSize-4};
        const depth = Math.ceil(Math.log2(nRooms))+1;
        bspSplit(root2d, rng, minRoom, depth);
        const leaves = [];
        bspLeaves(root2d, leaves);
        let rooms = bspRooms(leaves, rng, 2).slice(0, nRooms);
        const corridors = connectRooms(rooms, rng);
        const gridMap = rasterise(mapSize, rooms, corridors);
        const {segsH, segsV} = findWallSegments(gridMap, mapSize);
        
        const rootNode = new BABYLON.TransformNode("dungeon_root", scene);
        const allMeshes = [];
        const wallTex = new BABYLON.Texture("https://i.ibb.co/rR8f8QWg/Copilot-20260501-175332.png", scene);
        wallTex.uScale = 1.2; wallTex.vScale = 1.2;
        const floorTex = new BABYLON.Texture("https://i.ibb.co/prdbDwrj/Copilot-20260501-170824.png", scene);
        floorTex.uScale = 2.0; floorTex.vScale = 2.0;
        const wallMat = new BABYLON.StandardMaterial("wall_mat", scene);
        wallMat.diffuseTexture = wallTex;
        const floorMat = new BABYLON.StandardMaterial("floor_mat", scene);
        floorMat.diffuseTexture = floorTex;
        
        function addWallBox(id, wx, wy, wz, len, height, depth, rotY){
            const box = BABYLON.MeshBuilder.CreateBox(id, {width:len, height:height, depth:depth}, scene);
            box.position.set(wx, wy, wz);
            box.rotation.y = rotY;
            box.material = wallMat;
            box.parent = rootNode;
            box.checkCollisions = true;
            allMeshes.push(box);
            shadowGen.addShadowCaster(box);
            return box;
        }
        
        const totalWidth = (mapSize-2)*cellSz;
        const offsetX = -totalWidth/2;
        const offsetZ = -totalWidth/2;
        
        // Paredes horizontales y verticales con ajuste para que no sobresalgan
        segsH.forEach((seg,idx)=>{
            const len = (seg.x2-seg.x1+1)*cellSz;
            const wx = offsetX + (seg.x1+seg.x2)/2 * cellSz;
            const wz = offsetZ + seg.y * cellSz;
            addWallBox(`wh_${idx}`, wx, wallH/2, wz, len, wallH, wallT, 0);
        });
        segsV.forEach((seg,idx)=>{
            const len = (seg.y2-seg.y1+1)*cellSz;
            const wz = offsetZ + (seg.y1+seg.y2)/2 * cellSz;
            const wx = offsetX + seg.x * cellSz;
            addWallBox(`wv_${idx}`, wx, wallH/2, wz, wallT, wallH, len, 0);
        });
        
        // Suelo centrado
        const ground = BABYLON.MeshBuilder.CreateGround("dungeon_floor", {width: totalWidth, height: totalWidth}, scene);
        ground.position.set(0, 0, 0);
        ground.material = floorMat;
        ground.parent = rootNode;
        ground.receiveShadows = true;
        allMeshes.push(ground);
        
        // Decoraciones en habitaciones grandes
        rooms.forEach(room => {
            const cx = offsetX + (room.x + room.w/2) * cellSz;
            const cz = offsetZ + (room.y + room.h/2) * cellSz;
            const halfW = (room.w/2) * cellSz;
            const halfH = (room.h/2) * cellSz;
            if(room.w > 6 && room.h > 6){
                const corners = [
                    [cx - halfW + 0.8, cz - halfH + 0.8], [cx + halfW - 0.8, cz - halfH + 0.8],
                    [cx - halfW + 0.8, cz + halfH - 0.8], [cx + halfW - 0.8, cz + halfH - 0.8]
                ];
                corners.forEach(([px, pz]) => addColumn(px, pz, rootNode));
                addCandelabro(cx, cz, rootNode);
                if(Math.random()<0.7) addChest(cx + (Math.random()-0.5)*halfW*0.5, cz + (Math.random()-0.5)*halfH*0.5, rootNode, currentDepth);
            } else if(Math.random()<0.4){
                addCandelabro(cx, cz, rootNode);
            }
        });
        
        return { rootNode, allMeshes, rooms, cellSz, wallH, offsetX, offsetZ };
    }
    
    function clearDungeon(){
        if(currentDungeonRoot) currentDungeonRoot.dispose();
        enemies.forEach(e=>{ try{ e.mesh.dispose(); }catch(e){} });
        items.forEach(i=>{ try{ i.mesh.dispose(); }catch(e){} });
        chests.forEach(c=>{ try{ c.mesh.dispose(); }catch(e){} });
        if(portal) portal.dispose();
        enemies = []; items = []; chests = []; portal = null; portalActive = false;
    }
    
    function spawnEnemiesInRooms(rooms, cellSz, offsetX, offsetZ, level){
        const enemyList = [];
        const count = Math.min(rooms.length * (2 + Math.floor(level/2)), 30);
        for(let i=0;i<count;i++){
            const room = rooms[Math.floor(Math.random()*rooms.length)];
            const x = offsetX + (room.x + room.w/2 + (Math.random()-0.5)*room.w*0.6) * cellSz;
            const z = offsetZ + (room.y + room.h/2 + (Math.random()-0.5)*room.h*0.6) * cellSz;
            const isFemale = Math.random()<0.4;
            const mesh = BABYLON.MeshBuilder.CreateCylinder(`enemy_${i}`, {height:1.3, diameter:0.85, tessellation:12}, scene);
            mesh.position.set(x, 0.65, z);
            const mat = new BABYLON.StandardMaterial("e_mat", scene);
            if(isFemale){
                mat.diffuseColor = new BABYLON.Color3(0.7,0.3,0.8);
                mat.emissiveColor = new BABYLON.Color3(0.2,0,0.3);
            } else {
                mat.diffuseColor = new BABYLON.Color3(0.8,0.2,0.15);
                mat.emissiveColor = new BABYLON.Color3(0.2,0,0);
            }
            mesh.material = mat;
            mesh.checkCollisions = true;
            mesh.isPickable = true;
            shadowGen.addShadowCaster(mesh);
            const health = 50 + level*6;
            const damage = 11 + level*2;
            // Velocidad de enemigos: ahora muy rápida (similar al jugador)
            const speed = 4.5 + level*0.25;
            enemyList.push({ mesh, health, alive: true, damage, speed, attackCd:0, isFemale });
        }
        return enemyList;
    }
    
    function spawnItemsInRooms(rooms, cellSz, offsetX, offsetZ){
        const itms = [];
        const count = 5 + Math.floor(Math.random()*5);
        for(let i=0;i<count;i++){
            const room = rooms[Math.floor(Math.random()*rooms.length)];
            const x = offsetX + (room.x + room.w/2 + (Math.random()-0.5)*room.w*0.4) * cellSz;
            const z = offsetZ + (room.y + room.h/2 + (Math.random()-0.5)*room.h*0.4) * cellSz;
            const orb = BABYLON.MeshBuilder.CreateSphere(`item_${i}`, {diameter:0.45}, scene);
            orb.position.set(x, 0.3, z);
            const mat = new BABYLON.StandardMaterial("itm_mat", scene);
            mat.diffuseColor = new BABYLON.Color3(0.2,0.9,0.3);
            mat.emissiveColor = new BABYLON.Color3(0.1,0.5,0.1);
            orb.material = mat;
            orb.isPickable = true;
            itms.push({ mesh: orb, type:'health', value:25 });
        }
        return itms;
    }
    
    // Portal mejorado: óvalo negro con aureola azul radiante (visible)
    function spawnPortal(){
        if(portal) return;
        // Grupo del portal
        const portalGroup = new BABYLON.TransformNode("portal_group", scene);
        // Óvalo (elipse)
        const portalMesh = BABYLON.MeshBuilder.CreateSphere("portal_oval", {diameterX:1.7, diameterY:0.45, diameterZ:1.7, segments:32}, scene);
        const matBlack = new BABYLON.StandardMaterial("portal_mat_black", scene);
        matBlack.diffuseColor = new BABYLON.Color3(0,0,0);
        matBlack.emissiveColor = new BABYLON.Color3(0.15,0.05,0.3);
        matBlack.alpha = 0.95;
        portalMesh.material = matBlack;
        portalMesh.parent = portalGroup;
        
        // Anillo azul radiante
        const ring = BABYLON.MeshBuilder.CreateTorus("portal_ring", {diameter:1.85, thickness:0.1, tessellation:64}, scene);
        const matRing = new BABYLON.StandardMaterial("ring_mat", scene);
        matRing.emissiveColor = new BABYLON.Color3(0.3,0.7,1);
        matRing.diffuseColor = new BABYLON.Color3(0.1,0.3,0.9);
        ring.material = matRing;
        ring.rotation.x = Math.PI/2;
        ring.parent = portalGroup;
        
        // Segundo anillo más pequeño que gira
        const ring2 = BABYLON.MeshBuilder.CreateTorus("portal_ring2", {diameter:1.6, thickness:0.08, tessellation:64}, scene);
        const matRing2 = new BABYLON.StandardMaterial("ring2_mat", scene);
        matRing2.emissiveColor = new BABYLON.Color3(0.2,0.6,1);
        ring2.material = matRing2;
        ring2.rotation.x = Math.PI/2 + 0.3;
        ring2.parent = portalGroup;
        
        // Partículas azules ascendentes
        const particleSystem = new BABYLON.ParticleSystem("portalParticles", 300, scene);
        particleSystem.particleTexture = new BABYLON.Texture("https://assets.babylonjs.com/textures/particle.png", scene);
        particleSystem.emitter = portalGroup;
        particleSystem.minEmitBox = new BABYLON.Vector3(-0.7, -0.2, -0.7);
        particleSystem.maxEmitBox = new BABYLON.Vector3(0.7, 0.2, 0.7);
        particleSystem.color1 = new BABYLON.Color4(0.2, 0.5, 1, 1);
        particleSystem.color2 = new BABYLON.Color4(0, 0.3, 0.9, 1);
        particleSystem.colorDead = new BABYLON.Color4(0, 0, 0.6, 0);
        particleSystem.minSize = 0.06;
        particleSystem.maxSize = 0.18;
        particleSystem.minLifeTime = 0.5;
        particleSystem.maxLifeTime = 1.3;
        particleSystem.emitRate = 80;
        particleSystem.direction1 = new BABYLON.Vector3(-0.4, 0.7, -0.4);
        particleSystem.direction2 = new BABYLON.Vector3(0.4, 1.3, 0.4);
        particleSystem.gravity = new BABYLON.Vector3(0, 0.6, 0);
        particleSystem.start();
        
        if(currentRooms.length){
            const r = currentRooms[Math.floor(Math.random()*currentRooms.length)];
            const offsetX = currentDungeonRoot ? currentDungeonRoot.position.x : 0;
            const offsetZ = currentDungeonRoot ? currentDungeonRoot.position.z : 0;
            portalGroup.position.set(offsetX + (r.x+r.w/2)*1.45, 0.2, offsetZ + (r.y+r.h/2)*1.45);
        } else portalGroup.position.set(0,0.2,0);
        portalGroup.isPickable = true;
        portal = portalGroup;
        portalActive = true;
        shadowGen.addShadowCaster(portalMesh);
        showMessage("✨ PORTAL listo (usa 🚪)",2500);
    }
    
    function loadLevel(level){
        if(!gameActive) return;
        if(level>16){
            showMessage("🏆 ¡VICTORIA! Mazmorra conquistada 🏆",4000);
            return;
        }
        clearDungeon();
        // Semilla aleatoria: parte fija + nivel + número aleatorio para que cada partida sea diferente
        const randomSeed = Math.floor(Math.random() * 10000);
        const seed = 4242 + level * 137 + randomSeed;
        const mapSize = 70;
        const nRooms = 9 + Math.min(level,7) + Math.floor(Math.random()*3);
        const wallH = 3.6;
        const wallT = 0.5;
        const { rootNode, rooms, cellSz, offsetX, offsetZ } = generateDungeon(seed, mapSize, nRooms, wallH, wallT);
        currentDungeonRoot = rootNode;
        currentRooms = rooms;
        enemies = spawnEnemiesInRooms(rooms, cellSz, offsetX, offsetZ, level);
        items = spawnItemsInRooms(rooms, cellSz, offsetX, offsetZ);
        portalActive = false;
        if(portal) { portal.dispose(); portal=null; }
        updateUI();
        if(player && rooms.length){
            const start = rooms[0];
            player.position.set(offsetX + (start.x+start.w/2)*cellSz, 0.9, offsetZ + (start.y+start.h/2)*cellSz);
        }
        showMessage(`🏰 NIVEL ${level}/16 - MAZMORRA`,1500);
    }
    
    function openChest(chest){
        if(chest.opened) return;
        chest.opened = true;
        gold += chest.value;
        showMessage(`💰 +${chest.value} oro (cofre)`,1200);
        updateUI();
        if(chest.lid){
            let t=0;
            const obs = scene.onBeforeRenderObservable.add(()=>{
                t+=0.05;
                chest.lid.rotation.x = Math.min(Math.PI/2, t);
                if(t>=Math.PI/2) scene.onBeforeRenderObservable.remove(obs);
            });
        }
        chest.mesh.dispose();
        chests = chests.filter(c=>c!==chest);
    }
    
    function applyDamageToPlayer(dmg){
        if(!gameActive) return;
        const mitigated = Math.max(1, dmg - Math.floor(armor/3));
        playerHealth -= mitigated;
        updateUI();
        if(playerHealth<=0){
            playerHealth=0;
            gameActive=false;
            document.getElementById('death-overlay').classList.remove('hide');
            showMessage("💀 HAS MUERTO",1000);
        } else showMessage(`💔 -${mitigated} vida`,500);
    }
    
    function updateEnemies(dt){
        for(let i=0;i<enemies.length;i++){
            const e = enemies[i];
            if(!e.alive) continue;
            if(e.attackCd>0) e.attackCd -= dt;
            const dist = BABYLON.Vector3.Distance(player.position, e.mesh.position);
            if(dist < 1.1 && e.attackCd<=0){
                applyDamageToPlayer(e.damage);
                e.attackCd = 0.85;
            } else if(dist > 1.2){
                const dir = player.position.subtract(e.mesh.position).normalize();
                const move = dir.scale(e.speed * dt);
                e.mesh.moveWithCollisions(move);
                e.mesh.position.y = 0.65;
            }
        }
        enemies = enemies.filter(e=>e.alive);
        updateUI();
    }
    
    function checkItemPickup(){
        for(let i=0;i<items.length;i++){
            const it = items[i];
            if(BABYLON.Vector3.Distance(player.position, it.mesh.position) < 1.2){
                if(it.type === 'health'){
                    playerHealth = Math.min(maxHealth, playerHealth+it.value);
                    updateUI();
                    showMessage(`❤️ +${it.value} vida`,600);
                }
                it.mesh.dispose();
                items.splice(i,1);
                i--;
            }
        }
        for(let i=0;i<chests.length;i++){
            const c = chests[i];
            if(BABYLON.Vector3.Distance(player.position, c.mesh.position) < 1.5 && !c.opened){
                openChest(c);
                i--;
            }
        }
    }
    
    // Movimiento con ejes corregidos
    function updateMovement(dt){
        if(!gameActive || !player) return;
        let mx=0, mz=0;
        if(joystickActive && (Math.abs(joystickVector.x)>0.1 || Math.abs(joystickVector.y)>0.1)){
            mx = -joystickVector.x;
            mz = -joystickVector.y;
        } else {
            const f = (keyState.ArrowUp||keyState.w) ? 1 : (keyState.ArrowDown||keyState.s) ? -1 : 0;
            const s = (keyState.ArrowRight||keyState.d) ? 1 : (keyState.ArrowLeft||keyState.a) ? -1 : 0;
            mx = s; mz = f;
        }
        if(mx!==0 || mz!==0){
            const len = Math.hypot(mx,mz);
            mx/=len; mz/=len;
            let forward = cam.getForwardRay().direction.clone();
            let right = BABYLON.Vector3.Cross(forward, BABYLON.Vector3.Up()).normalize();
            forward.y = 0; forward.normalize();
            right.y = 0; right.normalize();
            const moveDir = forward.scale(mz).add(right.scale(mx));
            if(moveDir.length()>0.01){
                const moveVector = moveDir.scale(moveSpeed * dt);
                player.moveWithCollisions(moveVector);
                const angle = Math.atan2(moveDir.x, moveDir.z);
                player.rotation.y = angle;
            }
        }
        const target = player.position;
        const offset = new BABYLON.Vector3(isoZoom * 9.0, isoZoom * 10.5, isoZoom * 9.0);
        cam.position = target.add(offset);
        cam.setTarget(target);
    }
    
    // Controles
    const joyArea = document.getElementById('joystick-area');
    const knob = document.getElementById('joystick-knob');
    const joyRadius = 45;
    function updateJoystick(tx, ty){
        const rect = joyArea.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        let dx = tx - cx;
        let dy = ty - cy;
        const dist = Math.hypot(dx,dy);
        if(dist > joyRadius){ dx = dx * joyRadius / dist; dy = dy * joyRadius / dist; }
        knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        joystickVector.x = dx / joyRadius;
        joystickVector.y = dy / joyRadius;
        joystickActive = true;
    }
    function resetJoystick(){ joystickActive=false; joystickVector={x:0,y:0}; knob.style.transform='translate(-50%,-50%)'; }
    joyArea.addEventListener('touchstart', (e)=>{ e.preventDefault(); const t=e.touches[0]; updateJoystick(t.clientX,t.clientY); });
    document.addEventListener('touchmove', (e)=>{ if(joystickActive) for(let t of e.touches) if(joyArea.contains(t.target)){ updateJoystick(t.clientX,t.clientY); e.preventDefault(); break; } });
    document.addEventListener('touchend', ()=>resetJoystick());
    window.addEventListener('keydown', (e)=>{ if(keyState.hasOwnProperty(e.key)){ keyState[e.key]=true; e.preventDefault(); } });
    window.addEventListener('keyup', (e)=>{ if(keyState.hasOwnProperty(e.key)) keyState[e.key]=false; });
    
    document.getElementById('zoom-in-btn').addEventListener('click',()=>{ isoZoom = Math.max(0.55, isoZoom-0.12); showMessage(`Zoom ${Math.round(isoZoom*100)}%`,300); });
    document.getElementById('zoom-out-btn').addEventListener('click',()=>{ isoZoom = Math.min(1.8, isoZoom+0.12); showMessage(`Zoom ${Math.round(isoZoom*100)}%`,300); });
    document.getElementById('fireball-btn').addEventListener('click', ()=>shootFireball());
    document.getElementById('melee-btn').addEventListener('click', ()=>meleeAttack());
    document.getElementById('use-btn').addEventListener('click', ()=>usePortal());
    
    canvas.addEventListener('pointerdown', (e)=>{
        if(!gameActive) return;
        const pick = scene.pick(e.clientX, e.clientY, m=> enemies.some(en=>en.mesh===m) || (portal && portal===m) || chests.some(c=>c.mesh===m));
        if(pick.hit && pick.pickedMesh){
            if(enemies.some(en=>en.mesh===pick.pickedMesh)){
                const enemy = enemies.find(en=>en.mesh===pick.pickedMesh);
                if(enemy && enemy.alive){
                    enemy.health -= baseDamage;
                    if(enemy.health<=0){
                        enemy.mesh.dispose();
                        enemy.alive = false;
                        dropLoot(enemy.mesh.position.clone());
                        showMessage("💀 ENEMIGO DERROTADO",500);
                        updateUI();
                    } else showMessage(`⚔️ ${baseDamage} daño`,400);
                }
            } else if(pick.pickedMesh === portal && portalActive){
                usePortal();
            } else if(chests.some(c=>c.mesh===pick.pickedMesh)){
                const chest = chests.find(c=>c.mesh===pick.pickedMesh);
                if(chest && !chest.opened) openChest(chest);
            }
            e.preventDefault();
        }
    });
    
    function restartGame(){
        gameActive = true;
        playerHealth = maxHealth;
        baseDamage = 22;
        armor = 5;
        gold = 0;
        currentDepth = 1;
        updateUI();
        loadLevel(1);
        document.getElementById('death-overlay').classList.add('hide');
        showMessage("⚔️ AVENTURA RENACIDA ⚔️",2000);
    }
    document.getElementById('restart-btn').addEventListener('click', restartGame);
    
    let lastTime = performance.now();
    scene.onBeforeRenderObservable.add(()=>{
        const now = performance.now();
        let dt = Math.min(0.033, (now-lastTime)/1000);
        lastTime = now;
        if(gameActive && player){
            updateMovement(dt);
            updateEnemies(dt);
            updateFireballs(dt);
            checkItemPickup();
        }
    });
    
    createPlayer();
    loadLevel(1);
    engine.runRenderLoop(()=> scene.render());
    window.addEventListener('resize', ()=> engine.resize());
})();
</script>
</body>
