<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RPG Maná y Fuego - Estilo Diablo</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
        body{background:#0a0a0f;overflow:hidden;font-family:'Segoe UI',system-ui;touch-action:none;}
        canvas{width:100%!important;height:100%!important;outline:none;}
        #hud{
            position:fixed;top:16px;left:16px;right:16px;
            background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);
            border-radius:32px;padding:8px 18px;
            display:flex;justify-content:space-between;
            align-items:center;z-index:200;border:1px solid #c8aa4e;
            font-weight:bold;text-shadow:1px 1px 0 #000;
            pointer-events:none;font-size:14px;color:#f2e6c9;
            flex-wrap:wrap;gap:8px;
        }
        .hud-stat{background:#1e1a14aa;padding:4px 12px;border-radius:40px;backdrop-filter:blur(4px);display:flex;align-items:center;gap:4px;}
        .hud-stat span{color:#e0b84c;}
        .control-panel{position:fixed;bottom:20px;right:16px;z-index:250;display:flex;flex-direction:column;gap:12px;align-items:flex-end;}
        .zoom-btn{background:rgba(30,25,45,0.85);backdrop-filter:blur(8px);border:1px solid #c8aa4e;width:48px;height:48px;border-radius:40px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;color:#f7d86c;cursor:pointer;box-shadow:0 4px 12px black;transition:0.1s;}
        .zoom-btn:active{transform:scale(0.92);background:#c8aa4e33;}
        .joystick-area{position:fixed;bottom:20px;left:20px;width:130px;height:130px;z-index:300;touch-action:none;}
        .joystick-base{position:absolute;inset:0;background:rgba(10,10,20,0.6);border-radius:50%;border:2px solid rgba(210,180,100,0.5);backdrop-filter:blur(8px);}
        .joystick-knob{position:absolute;width:54px;height:54px;background:radial-gradient(circle at 35% 35%,#cbb86e,#7a5c2e);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px #ffd966;transition:transform 0.05s linear;pointer-events:none;border:1px solid #efcd7e;}
        .action-buttons{position:fixed;bottom:20px;right:80px;z-index:250;display:flex;gap:12px;align-items:center;}
        .action-btn{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;box-shadow:0 2px 16px rgba(0,0,0,0.5);backdrop-filter:blur(6px);transition:0.05s linear;border:2px solid rgba(255,255,200,0.7);}
        .action-btn:active{transform:scale(0.92);}
        .btn-magic-left{background:rgba(50,100,200,0.9);border-color:#6a9aff;color:#fff;font-size:24px;}
        .btn-fire-right{background:rgba(220,80,10,0.88);border-color:#ff6020;color:#fff;}
        #message-area{position:fixed;bottom:30%;left:0;right:0;text-align:center;z-index:280;pointer-events:none;font-size:20px;font-weight:bold;text-shadow:2px 2px 0 #000;color:#f5cc7a;background:rgba(0,0,0,0.5);width:fit-content;margin:auto;padding:6px 18px;border-radius:60px;backdrop-filter:blur(8px);white-space:nowrap;opacity:0;transition:opacity 0.2s;}
        .death-screen{position:fixed;inset:0;background:#0a0000dd;z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#e0b84c;font-size:32px;backdrop-filter:blur(10px);gap:20px;font-weight:bold;}
        .restart-btn{background:#a5652a;border:none;padding:12px 32px;font-size:24px;border-radius:60px;color:white;cursor:pointer;}
        .hide{display:none;}
        .instruction{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#211c11aa;color:#dbc983;font-size:10px;padding:2px 12px;border-radius:40px;pointer-events:none;white-space:nowrap;z-index:280;}
        @media (max-width:700px){.hud-stat{font-size:11px;padding:2px 8px;}#hud{padding:5px 10px;}}
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
        <div class="hud-stat">❤️ <span id="hp-text">100</span></div>
        <div class="hud-stat">💙 <span id="mana-text">100</span></div>
        <div class="hud-stat">🛡️ <span id="armor-text">5</span></div>
        <div class="hud-stat">⚔️ <span id="dmg-text">24</span></div>
        <div class="hud-stat">💰 <span id="gold-text">0</span></div>
        <div class="hud-stat">🗡️ <span id="depth-text">1</span>/16</div>
        <div class="hud-stat">👾 <span id="enemies-remaining">0</span></div>
    </div>
    <div class="control-panel">
        <div class="zoom-btn" id="zoom-in-btn">+</div>
        <div class="zoom-btn" id="zoom-out-btn">−</div>
    </div>
    <div class="joystick-area" id="joystick-area">
        <div class="joystick-base"></div>
        <div class="joystick-knob" id="joystick-knob"></div>
    </div>
    <div class="action-buttons">
        <div class="action-btn btn-magic-left" id="magic-btn">✨</div>
        <div class="action-btn btn-fire-right" id="firecone-btn">🔥</div>
    </div>
    <div id="message-area"></div>
    <div class="death-screen hide" id="death-overlay">
        <div>💀 HAS MUERTO 💀</div>
        <button class="restart-btn" id="restart-btn">REINICIAR AVENTURA</button>
    </div>
    <div class="instruction">🎮 Joystick | ✨ Magia área (consume maná) | 🔥 Cono de fuego frontal</div>

    <script>
        (function(){
            const canvas = document.getElementById('gameCanvas');
            const engine = new BABYLON.Engine(canvas, true);
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.04,0.04,0.06,1);
            scene.fogMode = BABYLON.Scene.FOGMODE_LINEAR;
            scene.fogStart = 15;
            scene.fogEnd = 60;
            scene.fogColor = new BABYLON.Color3(0.08,0.08,0.12);
            
            const ambL = new BABYLON.HemisphericLight('amb', new BABYLON.Vector3(0,1,0), scene);
            ambL.intensity = 0.65;
            const dirL = new BABYLON.DirectionalLight('sun', new BABYLON.Vector3(-1, -1.2, -0.7), scene);
            dirL.intensity = 1.2;
            dirL.position = new BABYLON.Vector3(25,35,20);
            const shadowGen = new BABYLON.ShadowGenerator(1024, dirL);
            shadowGen.useBlurExponentialShadowMap = true;
            shadowGen.blurKernel = 8;
            
            const cam = new BABYLON.FreeCamera('isoCam', new BABYLON.Vector3(12,14,12), scene);
            cam.setTarget(BABYLON.Vector3.Zero());
            scene.activeCamera = cam;
            
            // --- Jugador ---
            let player = null;
            let playerHealth = 100;
            let maxHealth = 100;
            let maxMana = 100;
            let currentMana = 100;
            let baseDamage = 24;
            let armor = 5;
            let gold = 0;
            let currentDepth = 1;
            let gameActive = true;
            
            let enemies = [];
            let items = [];
            let chests = [];
            let currentDungeonRoot = null;
            let currentRooms = [];
            
            // Movimiento
            let joystickActive = false;
            let joystickVector = {x:0,y:0};
            let keyState = {ArrowUp:false,ArrowDown:false,ArrowLeft:false,ArrowRight:false,w:false,s:false,a:false,d:false};
            let isoZoom = 1.0;
            let moveSpeed = 9.5;
            
            // UI
            const hpSpan = document.getElementById('hp-text');
            const manaSpan = document.getElementById('mana-text');
            const depthSpan = document.getElementById('depth-text');
            const enemiesSpan = document.getElementById('enemies-remaining');
            const goldSpan = document.getElementById('gold-text');
            const dmgSpan = document.getElementById('dmg-text');
            const armorSpan = document.getElementById('armor-text');
            const msgDiv = document.getElementById('message-area');
            
            function showMessage(txt, dur=1600){
                msgDiv.style.opacity='1';
                msgDiv.innerText=txt;
                setTimeout(()=>msgDiv.style.opacity='0',dur);
            }
            function updateUI(){
                hpSpan.innerText = Math.max(0,playerHealth);
                manaSpan.innerText = Math.max(0,currentMana);
                depthSpan.innerText = `${currentDepth}/16`;
                const alive = enemies.filter(e=>e.alive).length;
                enemiesSpan.innerText = alive;
                goldSpan.innerText = gold;
                dmgSpan.innerText = baseDamage;
                armorSpan.innerText = armor;
                if(alive===0 && gameActive && currentDungeonRoot && currentDepth<16){
                    nextLevel();
                }
                if(alive===0 && currentDepth>=16){
                    showMessage("🏆 ¡VICTORIA! Mazmorra conquistada 🏆",4000);
                }
            }
            function nextLevel(){
                if(currentDepth<16){
                    currentDepth++;
                    showMessage(`⬇️ BAJANDO A NIVEL ${currentDepth}`,1500);
                    loadLevel(currentDepth);
                }
            }
            
            // Personaje HVGirl
            const HVGIRL_URL = 'https://assets.babylonjs.com/meshes/HVGirl.glb';
            function createPlayer(){
                if(player) player.dispose();
                player = BABYLON.MeshBuilder.CreateCapsule('player', {height:1.8, radius:0.45, tessellation:12}, scene);
                player.position.set(0,0.9,0);
                player.checkCollisions = true;
                player.isPickable = false;
                player.isVisible = false;
                shadowGen.addShadowCaster(player);
                BABYLON.SceneLoader.ImportMesh('', '', HVGIRL_URL, scene, (meshes, skeletons, animGroups) => {
                    if(!player || player.isDisposed()) return;
                    const root = new BABYLON.TransformNode('hvg_root', scene);
                    root.parent = player;
                    root.scaling.setAll(0.001);
                    root.rotation.x = Math.PI/2;
                    root.position.y = -0.9;
                    meshes.forEach(m => { m.parent = root; m.isPickable = false; });
                    if(animGroups && animGroups.length) animGroups[0].start(true);
                }, null, (sc,msg)=>console.warn(msg));
            }
            
            // Partículas reutilizables
            function createExplosion(position, color1, color2){
                const ps = new BABYLON.ParticleSystem("explosion", 40, scene);
                ps.particleTexture = new BABYLON.Texture("https://assets.babylonjs.com/textures/particle.png", scene);
                ps.emitter = position;
                ps.minEmitBox = new BABYLON.Vector3(-0.4, -0.3, -0.4);
                ps.maxEmitBox = new BABYLON.Vector3(0.4, 0.4, 0.4);
                ps.color1 = color1;
                ps.color2 = color2;
                ps.colorDead = new BABYLON.Color4(0,0,0,0);
                ps.minSize = 0.1;
                ps.maxSize = 0.35;
                ps.minLifeTime = 0.2;
                ps.maxLifeTime = 0.6;
                ps.emitRate = 100;
                ps.direction1 = new BABYLON.Vector3(-0.8, -0.2, -0.8);
                ps.direction2 = new BABYLON.Vector3(0.8, 1.2, 0.8);
                ps.start();
                setTimeout(()=> ps.dispose(), 500);
            }
            
            // Magia de área (azul) - izquierda
            function castAreaMagic(){
                if(!gameActive || !player) return;
                if(currentMana < 30){
                    showMessage("❌ ¡Maná insuficiente!", 1000);
                    return;
                }
                currentMana -= 30;
                updateUI();
                const center = player.position.clone();
                center.y += 1.0;
                // Efecto visual esfera expansiva
                const sphere = BABYLON.MeshBuilder.CreateSphere("magicSphere", {diameter:0.5, segments:16}, scene);
                sphere.position.copyFrom(center);
                const material = new BABYLON.StandardMaterial("magicMat", scene);
                material.diffuseColor = new BABYLON.Color3(0.2, 0.5, 1);
                material.emissiveColor = new BABYLON.Color3(0.1, 0.3, 0.9);
                material.alpha = 0.7;
                sphere.material = material;
                let scale = 0.5;
                const obs = scene.onBeforeRenderObservable.add(() => {
                    scale += 0.15;
                    sphere.scaling.setAll(scale);
                    if(scale >= 5.0){
                        sphere.dispose();
                        scene.onBeforeRenderObservable.remove(obs);
                    }
                });
                for(let i=0; i<6; i++) createExplosion(center, new BABYLON.Color4(0.3,0.6,1,1), new BABYLON.Color4(0.1,0.2,0.8,1));
                let hits = 0;
                for(let e of enemies){
                    if(!e.alive) continue;
                    if(BABYLON.Vector3.Distance(center, e.mesh.position) < 5.0){
                        e.health -= 55;
                        if(e.health<=0){
                            e.mesh.dispose();
                            e.alive = false;
                            dropLoot(e.mesh.position.clone());
                            showMessage("💀 ENEMIGO MUERTO",400);
                            updateUI();
                        } else showMessage(`✨ 55 daño mágico`,300);
                        hits++;
                        if(e.roomId !== undefined){
                            for(let other of enemies){
                                if(other.roomId === e.roomId && other !== e && other.alive && !other.aggroed) other.aggroed = true;
                            }
                        }
                    }
                }
                if(hits===0) showMessage("❌ No hay enemigos cerca",800);
                else showMessage(`✨ MAGIA DE ÁREA (${hits} enemigos)`,1200);
            }
            
            // Cono de fuego frontal (derecha) - igual que antes
            function fireCone(){
                if(!gameActive || !player) return;
                const angle = player.rotation.y;
                const forward = new BABYLON.Vector3(Math.sin(angle), 0, Math.cos(angle)).normalize();
                const origin = player.position.clone();
                origin.y += 1.0;
                for(let i=0; i<3; i++){
                    const off = forward.scale(1.5);
                    createExplosion(origin.add(off), new BABYLON.Color4(1,0.6,0.1,1), new BABYLON.Color4(1,0.2,0,1));
                }
                let hitCount = 0;
                for(let e of enemies){
                    if(!e.alive) continue;
                    const toEnemy = e.mesh.position.subtract(origin);
                    const dist = toEnemy.length();
                    if(dist > 4.5) continue;
                    const dirToEnemy = toEnemy.normalize();
                    const dot = BABYLON.Vector3.Dot(forward, dirToEnemy);
                    if(dot > 0.5){
                        e.health -= 48;
                        if(e.health<=0){
                            e.mesh.dispose();
                            e.alive = false;
                            dropLoot(e.mesh.position.clone());
                            showMessage("💀 ENEMIGO MUERTO",400);
                            updateUI();
                        } else showMessage(`🔥 48 daño`,300);
                        hitCount++;
                        if(e.roomId !== undefined){
                            for(let other of enemies){
                                if(other.roomId === e.roomId && other !== e && other.alive && !other.aggroed) other.aggroed = true;
                            }
                        }
                    }
                }
                if(hitCount===0) showMessage("❌ No hay enemigos cerca",800);
                else showMessage(`🔥 CONO DE FUEGO`,500);
            }
            
            // Botín (incluye poción de maná)
            function dropLoot(pos){
                const roll = Math.random();
                if(roll < 0.4){
                    const amount = 10 + Math.floor(Math.random()*15) + currentDepth*2;
                    gold += amount;
                    showMessage(`💰 +${amount} oro`,800);
                } else if(roll < 0.65){
                    baseDamage += 3;
                    showMessage(`⚔️ Daño +3 (${baseDamage})`,1200);
                } else if(roll < 0.85){
                    armor += 2;
                    showMessage(`🛡️ Armadura +2 (${armor})`,1200);
                } else {
                    currentMana = Math.min(maxMana, currentMana + 40);
                    showMessage(`💙 +40 maná`,1200);
                }
                updateUI();
            }
            
            // ---------- Generador de mazmorra (BSP con textura exterior y columnas mejoradas) ----------
            function mkRng(seed){
                let s = seed>>>0;
                return ()=>{ s+=0x6D2B79F5; let t=s; t=Math.imul(t^t>>>15,t|1); t^=t+Math.imul(t^t>>>7,t|61); return ((t^t>>>14)>>>0)/4294967296; };
            }
            
            function generateDungeon(levelSeed, mapSize, nRooms, wallH, wallT){
                const rng = mkRng(levelSeed);
                const cellSz = 1.45;
                // BSP (idéntico al anterior)
                function bspSplit(node, rng, minSize, depth){
                    if(depth<=0 || node.w<minSize*2.2 || node.h<minSize*2.2){ node.leaf=true; return; }
                    const horizontal = node.w/node.h < 1.1 ? true : (node.h/node.w < 1.1 ? false : rng()<0.5);
                    if(horizontal){
                        const split = Math.floor(minSize + rng()*(node.h-minSize*2));
                        node.a = { x:node.x, y:node.y, w:node.w, h:split };
                        node.b = { x:node.x, y:node.y+split, w:node.w, h:node.h-split };
                    } else {
                        const split = Math.floor(minSize + rng()*(node.w-minSize*2));
                        node.a = { x:node.x, y:node.y, w:split, h:node.h };
                        node.b = { x:node.x+split, y:node.y, w:node.w-split, h:node.h };
                    }
                    bspSplit(node.a, rng, minSize, depth-1);
                    bspSplit(node.b, rng, minSize, depth-1);
                }
                function bspLeaves(node, out){ if(node.leaf){ out.push(node); return; } if(node.a) bspLeaves(node.a, out); if(node.b) bspLeaves(node.b, out); }
                function bspRooms(leaves, rng, padding){
                    return leaves.map(l=>{
                        const px = padding + Math.floor(rng()*padding*0.8);
                        const py = padding + Math.floor(rng()*padding*0.8);
                        let w = Math.max(4, l.w - px*2 - Math.floor(rng()*3));
                        let h = Math.max(4, l.h - py*2 - Math.floor(rng()*3));
                        if(rng()<0.3){ w = Math.min(l.w-2, w+3); h = Math.min(l.h-2, h+3); }
                        if(rng()<0.2){ w = Math.max(3, w-2); h = Math.max(3, h-2); }
                        return { x:l.x+px, y:l.y+py, w, h };
                    });
                }
                function connectRooms(rooms, rng){
                    const corridors=[];
                    const sorted=[...rooms].sort((a,b)=>(a.x+a.w/2)-(b.x+b.w/2));
                    for(let i=0;i<sorted.length-1;i++){
                        const a=sorted[i], b=sorted[i+1];
                        const ax=Math.floor(a.x+a.w/2), ay=Math.floor(a.y+a.h/2);
                        const bx=Math.floor(b.x+b.w/2), by=Math.floor(b.y+b.h/2);
                        if(rng()<0.5){
                            corridors.push({x1:ax,y1:ay,x2:bx,y2:ay,w:2});
                            corridors.push({x1:bx,y1:ay,x2:bx,y2:by,w:2});
                        } else {
                            corridors.push({x1:ax,y1:ay,x2:ax,y2:by,w:2});
                            corridors.push({x1:ax,y1:by,x2:bx,y2:by,w:2});
                        }
                    }
                    return corridors;
                }
                function rasterise(size, rooms, corridors){
                    const grid = Array.from({length:size},()=>new Uint8Array(size));
                    rooms.forEach(r=>{
                        for(let gy=r.y;gy<r.y+r.h;gy++)
                            for(let gx=r.x;gx<r.x+r.w;gx++)
                                if(gy>=0&&gy<size&&gx>=0&&gx<size) grid[gy][gx]=1;
                    });
                    corridors.forEach(c=>{
                        const hw=Math.floor(c.w/2);
                        const x1=Math.min(c.x1,c.x2), x2=Math.max(c.x1,c.x2);
                        const y1=Math.min(c.y1,c.y2), y2=Math.max(c.y1,c.y2);
                        for(let gy=y1-hw;gy<=y2+hw;gy++)
                            for(let gx=x1-hw;gx<=x2+hw;gx++)
                                if(gy>=0&&gy<size&&gx>=0&&gx<size && !grid[gy][gx]) grid[gy][gx]=2;
                    });
                    return grid;
                }
                function findWallSegments(grid, size){
                    const isFloor=c=>c===1||c===2;
                    const segsH=[], segsV=[];
                    for(let gy=0;gy<size;gy++){
                        let run=null;
                        for(let gx=0;gx<=size;gx++){
                            const here = gx<size && !isFloor(grid[gy][gx]);
                            const adj = gx<size && ((gy>0&&isFloor(grid[gy-1][gx]))||(gy<size-1&&isFloor(grid[gy+1][gx])));
                            if(here && adj){ if(!run) run={x1:gx,y:gy,x2:gx}; else run.x2=gx; }
                            else if(run){ segsH.push(run); run=null; }
                        }
                    }
                    for(let gx=0;gx<size;gx++){
                        let run=null;
                        for(let gy=0;gy<=size;gy++){
                            const here = gy<size && !isFloor(grid[gy][gx]);
                            const adj = gy<size && ((gx>0&&isFloor(grid[gy][gx-1]))||(gx<size-1&&isFloor(grid[gy][gx+1])));
                            if(here && adj){ if(!run) run={y1:gy,x:gx,y2:gy}; else run.y2=gy; }
                            else if(run){ segsV.push(run); run=null; }
                        }
                    }
                    return {segsH, segsV};
                }
                
                const minRoom = Math.max(5, Math.floor(mapSize/nRooms*0.8));
                const root2d = {x:2,y:2,w:mapSize-4,h:mapSize-4};
                const depth = Math.ceil(Math.log2(nRooms))+1;
                bspSplit(root2d, rng, minRoom, depth);
                const leaves = [];
                bspLeaves(root2d, leaves);
                let rooms = bspRooms(leaves, rng, 2).slice(0, nRooms);
                const corridors = connectRooms(rooms, rng);
                const gridMap = rasterise(mapSize, rooms, corridors);
                const {segsH, segsV} = findWallSegments(gridMap, mapSize);
                
                const rootNode = new BABYLON.TransformNode("dungeon_root", scene);
                const allMeshes = [];
                const wallTex = new BABYLON.Texture("https://i.ibb.co/rR8f8QWg/Copilot-20260501-175332.png", scene);
                wallTex.uScale = 1.2; wallTex.vScale = 1.2;
                const floorTexInterior = new BABYLON.Texture("https://i.ibb.co/prdbDwrj/Copilot-20260501-170824.png", scene);
                floorTexInterior.uScale = 2.0; floorTexInterior.vScale = 2.0;
                const floorTexExterior = new BABYLON.Texture("https://i.ibb.co/BHkzLgFQ/None-001-Diffuse.png", scene);
                floorTexExterior.uScale = 2.0; floorTexExterior.vScale = 2.0;
                
                const wallMat = new BABYLON.StandardMaterial("wall_mat", scene);
                wallMat.diffuseTexture = wallTex;
                const floorMatInterior = new BABYLON.StandardMaterial("floor_mat_interior", scene);
                floorMatInterior.diffuseTexture = floorTexInterior;
                const floorMatExterior = new BABYLON.StandardMaterial("floor_mat_exterior", scene);
                floorMatExterior.diffuseTexture = floorTexExterior;
                
                function addWallBox(id, wx, wy, wz, len, height, depth, rotY){
                    const box = BABYLON.MeshBuilder.CreateBox(id, {width:len, height:height, depth:depth}, scene);
                    box.position.set(wx, wy, wz);
                    box.rotation.y = rotY;
                    box.material = wallMat;
                    box.parent = rootNode;
                    box.checkCollisions = true;
                    allMeshes.push(box);
                    shadowGen.addShadowCaster(box);
                    return box;
                }
                
                const totalWidth = (mapSize-2)*cellSz;
                const offsetX = -totalWidth/2;
                const offsetZ = -totalWidth/2;
                const adjust = -0.05;
                segsH.forEach((seg,idx)=>{
                    const len = (seg.x2-seg.x1+1)*cellSz - adjust;
                    const wx = offsetX + (seg.x1+seg.x2)/2 * cellSz;
                    const wz = offsetZ + seg.y * cellSz;
                    addWallBox(`wh_${idx}`, wx, wallH/2, wz, len, wallH, wallT*2, 0);
                });
                segsV.forEach((seg,idx)=>{
                    const len = (seg.y2-seg.y1+1)*cellSz - adjust;
                    const wz = offsetZ + (seg.y1+seg.y2)/2 * cellSz;
                    const wx = offsetX + seg.x * cellSz;
                    addWallBox(`wv_${idx}`, wx, wallH/2, wz, wallT*2, wallH, len, 0);
                });
                
                // Suelo con textura interior / exterior
                for(let gy=0; gy<mapSize; gy++){
                    for(let gx=0; gx<mapSize; gx++){
                        const isInterior = gridMap[gy] && gridMap[gy][gx] !== 0;
                        const materialToUse = isInterior ? floorMatInterior : floorMatExterior;
                        const tile = BABYLON.MeshBuilder.CreateGround(`floor_${gx}_${gy}`, {width: cellSz-0.02, height: cellSz-0.02}, scene);
                        tile.position.set(offsetX + gx*cellSz, 0, offsetZ + gy*cellSz);
                        tile.material = materialToUse;
                        tile.parent = rootNode;
                        tile.receiveShadows = true;
                        allMeshes.push(tile);
                    }
                }
                
                // Columnas: misma textura que pared, altura wallH, base y capitel cuadrados
                function addSquareColumn(px, pz){
                    const group = new BABYLON.TransformNode("col_square", scene);
                    group.position.set(px,0,pz);
                    group.parent = rootNode;
                    const shaftHeight = wallH - 0.6; // dejar espacio para base y capitel
                    const shaft = BABYLON.MeshBuilder.CreateBox("col_shaft", {width:0.55, height:shaftHeight, depth:0.55}, scene);
                    shaft.parent = group;
                    shaft.position.y = 0.3 + shaftHeight/2;
                    shaft.material = wallMat;
                    shadowGen.addShadowCaster(shaft);
                    allMeshes.push(shaft);
                    // Base cuadrada
                    const base = BABYLON.MeshBuilder.CreateBox("col_base", {width:0.75, height:0.25, depth:0.75}, scene);
                    base.parent = group;
                    base.position.y = 0.125;
                    base.material = wallMat;
                    shadowGen.addShadowCaster(base);
                    allMeshes.push(base);
                    // Capitel
                    const capital = BABYLON.MeshBuilder.CreateBox("col_capital", {width:0.7, height:0.25, depth:0.7}, scene);
                    capital.parent = group;
                    capital.position.y = wallH - 0.125;
                    capital.material = wallMat;
                    shadowGen.addShadowCaster(capital);
                    allMeshes.push(capital);
                }
                
                // Pilares centrales (versión más robusta)
                function addCentralPillar(px, pz){
                    const group = new BABYLON.TransformNode("center_pillar", scene);
                    group.position.set(px,0,pz);
                    group.parent = rootNode;
                    const shaft = BABYLON.MeshBuilder.CreateBox("cshaft", {width:0.9, height:wallH-0.5, depth:0.9}, scene);
                    shaft.parent = group;
                    shaft.position.y = 0.25 + (wallH-0.5)/2;
                    shaft.material = wallMat;
                    shadowGen.addShadowCaster(shaft);
                    allMeshes.push(shaft);
                    const base = BABYLON.MeshBuilder.CreateBox("cbase", {width:1.1, height:0.25, depth:1.1}, scene);
                    base.parent = group;
                    base.position.y = 0.125;
                    base.material = wallMat;
                    shadowGen.addShadowCaster(base);
                    allMeshes.push(base);
                    const capital = BABYLON.MeshBuilder.CreateBox("ccapital", {width:1.05, height:0.25, depth:1.05}, scene);
                    capital.parent = group;
                    capital.position.y = wallH - 0.125;
                    capital.material = wallMat;
                    shadowGen.addShadowCaster(capital);
                    allMeshes.push(capital);
                }
                
                // Decoración: columnas cuadradas en esquinas y pilares centrales en habitaciones grandes
                for(let r of rooms){
                    const cx = offsetX + (r.x + r.w/2) * cellSz;
                    const cz = offsetZ + (r.y + r.h/2) * cellSz;
                    const halfW = (r.w/2) * cellSz;
                    const halfH = (r.h/2) * cellSz;
                    if(r.w > 6 && r.h > 6){
                        const corners = [
                            [cx - halfW + 0.8, cz - halfH + 0.8], [cx + halfW - 0.8, cz - halfH + 0.8],
                            [cx - halfW + 0.8, cz + halfH - 0.8], [cx + halfW - 0.8, cz + halfH - 0.8]
                        ];
                        corners.forEach(([px, pz]) => addSquareColumn(px, pz));
                        addCentralPillar(cx, cz);
                        // Cofre
                        const chestGroup = new BABYLON.TransformNode("chest", scene);
                        chestGroup.position.set(cx + (Math.random()-0.5)*halfW*0.5, 0.1, cz + (Math.random()-0.5)*halfH*0.5);
                        chestGroup.parent = rootNode;
                        const box = BABYLON.MeshBuilder.CreateBox("chest_box", {width:0.8, height:0.6, depth:0.6}, scene);
                        box.parent = chestGroup; box.position.y=0.3;
                        const wood = new BABYLON.StandardMaterial("wood", scene);
                        wood.diffuseColor = new BABYLON.Color3(0.7,0.45,0.25);
                        box.material = wood;
                        chests.push({ mesh: chestGroup, value: 30+currentDepth*5, opened: false, lid: null });
                        allMeshes.push(box);
                    }
                }
                return { rootNode, allMeshes, rooms, cellSz, wallH, offsetX, offsetZ };
            }
            
            function clearDungeon(){
                if(currentDungeonRoot) currentDungeonRoot.dispose();
                enemies.forEach(e=>{ try{ e.mesh.dispose(); }catch(e){} });
                items.forEach(i=>{ try{ i.mesh.dispose(); }catch(e){} });
                chests.forEach(c=>{ try{ c.mesh.dispose(); }catch(e){} });
                enemies = []; items = []; chests = [];
            }
            
            // Enemigos (cilindro + posibilidad de modelo Dude, pero aquí usamos cilindro por robustez)
            function spawnEnemiesInRooms(rooms, cellSz, offsetX, offsetZ, level, startPos){
                const enemyList = [];
                const roomsToSpawn = rooms.slice(1);
                const count = Math.min(roomsToSpawn.length * (1 + Math.floor(level/3)), 20);
                for(let i=0;i<count;i++){
                    const room = roomsToSpawn[Math.floor(Math.random()*roomsToSpawn.length)];
                    let x = offsetX + (room.x + room.w/2 + (Math.random()-0.5)*room.w*0.6) * cellSz;
                    let z = offsetZ + (room.y + room.h/2 + (Math.random()-0.5)*room.h*0.6) * cellSz;
                    let distToStart = Math.hypot(x - startPos.x, z - startPos.z);
                    if(distToStart < 20){
                        let attempts = 0;
                        while(distToStart < 20 && attempts < 10){
                            const otherRoom = roomsToSpawn[Math.floor(Math.random()*roomsToSpawn.length)];
                            x = offsetX + (otherRoom.x + otherRoom.w/2 + (Math.random()-0.5)*otherRoom.w*0.6) * cellSz;
                            z = offsetZ + (otherRoom.y + otherRoom.h/2 + (Math.random()-0.5)*otherRoom.h*0.6) * cellSz;
                            distToStart = Math.hypot(x - startPos.x, z - startPos.z);
                            attempts++;
                        }
                    }
                    const mesh = BABYLON.MeshBuilder.CreateCylinder(`enemy_${i}`, {height:1.3, diameter:0.85, tessellation:8}, scene);
                    mesh.position.set(x, 0.65, z);
                    const mat = new BABYLON.StandardMaterial("e_mat", scene);
                    mat.diffuseColor = new BABYLON.Color3(0.8,0.2,0.15);
                    mesh.material = mat;
                    mesh.checkCollisions = true;
                    mesh.isPickable = true;
                    shadowGen.addShadowCaster(mesh);
                    const health = 35 + level*3;
                    const damage = 5 + Math.floor(level/2);
                    const speed = 6.0 + level*0.2;
                    const roomId = roomsToSpawn.indexOf(room);
                    enemyList.push({ mesh, health, alive: true, damage, speed, attackCd:0, visionRange:14, roomId, aggroed: false });
                }
                return enemyList;
            }
            
            function spawnItemsInRooms(rooms, cellSz, offsetX, offsetZ){
                const itms = [];
                const count = 4 + Math.floor(Math.random()*4);
                const roomsToUse = rooms.slice(1);
                for(let i=0;i<count;i++){
                    const room = roomsToUse[Math.floor(Math.random()*roomsToUse.length)];
                    const x = offsetX + (room.x + room.w/2 + (Math.random()-0.5)*room.w*0.4) * cellSz;
                    const z = offsetZ + (room.y + room.h/2 + (Math.random()-0.5)*room.h*0.4) * cellSz;
                    const orb = BABYLON.MeshBuilder.CreateSphere(`item_${i}`, {diameter:0.45, segments:8}, scene);
                    orb.position.set(x, 0.3, z);
                    const mat = new BABYLON.StandardMaterial("itm_mat", scene);
                    mat.diffuseColor = new BABYLON.Color3(0.2,0.9,0.3);
                    orb.material = mat;
                    orb.isPickable = true;
                    itms.push({ mesh: orb, type:'health', value:20 });
                }
                return itms;
            }
            
            function loadLevel(level){
                if(!gameActive) return;
                if(level>16){
                    showMessage("🏆 ¡VICTORIA! Mazmorra conquistada 🏆",4000);
                    return;
                }
                clearDungeon();
                const randomSeed = Math.floor(Math.random() * 10000);
                const seed = 4242 + level * 137 + randomSeed;
                const mapSize = 68;
                const nRooms = 8 + Math.min(level,6);
                const wallH = 4.2;
                const wallT = 0.45;
                const { rootNode, rooms, cellSz, offsetX, offsetZ } = generateDungeon(seed, mapSize, nRooms, wallH, wallT);
                currentDungeonRoot = rootNode;
                currentRooms = rooms;
                const startRoom = rooms[0];
                const startPos = { x: offsetX + (startRoom.x+startRoom.w/2)*cellSz, z: offsetZ + (startRoom.y+startRoom.h/2)*cellSz };
                enemies = spawnEnemiesInRooms(rooms, cellSz, offsetX, offsetZ, level, startPos);
                items = spawnItemsInRooms(rooms, cellSz, offsetX, offsetZ);
                updateUI();
                if(player){
                    player.position.set(startPos.x, 0.9, startPos.z);
                }
                showMessage(`🏰 NIVEL ${level}/16 - MAZMORRA`,1500);
            }
            
            function openChest(chest){
                if(chest.opened) return;
                chest.opened = true;
                gold += chest.value;
                showMessage(`💰 +${chest.value} oro`,1200);
                updateUI();
                chest.mesh.dispose();
                chests = chests.filter(c=>c!==chest);
            }
            
            function applyDamageToPlayer(dmg){
                if(!gameActive) return;
                const mitigated = Math.max(1, dmg - Math.floor(armor/3));
                playerHealth -= mitigated;
                updateUI();
                if(playerHealth<=0){
                    playerHealth=0;
                    gameActive=false;
                    document.getElementById('death-overlay').classList.remove('hide');
                    showMessage("💀 HAS MUERTO",1000);
                } else showMessage(`💔 -${mitigated} vida`,500);
            }
            
            function updateEnemies(dt){
                for(let i=0;i<enemies.length;i++){
                    const e = enemies[i];
                    if(!e.alive) continue;
                    const distToPlayer = BABYLON.Vector3.Distance(player.position, e.mesh.position);
                    const inVision = distToPlayer < e.visionRange;
                    if(e.aggroed || inVision){
                        e.aggroed = true;
                        if(e.attackCd>0) e.attackCd -= dt;
                        if(distToPlayer < 1.1 && e.attackCd<=0){
                            applyDamageToPlayer(e.damage);
                            e.attackCd = 0.85;
                        } else if(distToPlayer > 1.2){
                            const dir = player.position.subtract(e.mesh.position).normalize();
                            const move = dir.scale(e.speed * dt);
                            e.mesh.moveWithCollisions(move);
                            e.mesh.position.y = 0.65;
                        }
                    }
                }
                enemies = enemies.filter(e=>e.alive);
                updateUI();
            }
            
            function checkItemPickup(){
                for(let i=0;i<items.length;i++){
                    const it = items[i];
                    if(BABYLON.Vector3.Distance(player.position, it.mesh.position) < 1.2){
                        if(it.type === 'health'){
                            playerHealth = Math.min(maxHealth, playerHealth+it.value);
                            updateUI();
                            showMessage(`❤️ +${it.value} vida`,600);
                        }
                        it.mesh.dispose();
                        items.splice(i,1);
                        i--;
                    }
                }
                for(let i=0;i<chests.length;i++){
                    const c = chests[i];
                    if(BABYLON.Vector3.Distance(player.position, c.mesh.position) < 1.5 && !c.opened){
                        openChest(c);
                        i--;
                    }
                }
            }
            
            function updateMovement(dt){
                if(!gameActive || !player) return;
                let mx=0, mz=0;
                if(joystickActive && (Math.abs(joystickVector.x)>0.1 || Math.abs(joystickVector.y)>0.1)){
                    mx = -joystickVector.x;
                    mz = -joystickVector.y;
                } else {
                    const f = (keyState.ArrowUp||keyState.w) ? 1 : (keyState.ArrowDown||keyState.s) ? -1 : 0;
                    const s = (keyState.ArrowRight||keyState.d) ? 1 : (keyState.ArrowLeft||keyState.a) ? -1 : 0;
                    mx = s; mz = f;
                }
                if(mx!==0 || mz!==0){
                    const len = Math.hypot(mx,mz);
                    mx/=len; mz/=len;
                    let forward = cam.getForwardRay().direction.clone();
                    let right = BABYLON.Vector3.Cross(forward, BABYLON.Vector3.Up()).normalize();
                    forward.y = 0; forward.normalize();
                    right.y = 0; right.normalize();
                    const moveDir = forward.scale(mz).add(right.scale(mx));
                    if(moveDir.length()>0.01){
                        const moveVector = moveDir.scale(moveSpeed * dt);
                        player.moveWithCollisions(moveVector);
                        player.rotation.y = Math.atan2(moveDir.x, moveDir.z);
                    }
                }
                const target = player.position;
                const offset = new BABYLON.Vector3(isoZoom * 9.0, isoZoom * 10.5, isoZoom * 9.0);
                cam.position = target.add(offset);
                cam.setTarget(target);
            }
            
            // Controles táctiles y teclado
            const joyArea = document.getElementById('joystick-area');
            const knob = document.getElementById('joystick-knob');
            const joyRadius = 45;
            function updateJoystick(tx, ty){
                const rect = joyArea.getBoundingClientRect();
                const cx = rect.left + rect.width/2;
                const cy = rect.top + rect.height/2;
                let dx = tx - cx;
                let dy = ty - cy;
                const dist = Math.hypot(dx,dy);
                if(dist > joyRadius){ dx = dx * joyRadius / dist; dy = dy * joyRadius / dist; }
                knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joystickVector.x = dx / joyRadius;
                joystickVector.y = dy / joyRadius;
                joystickActive = true;
            }
            function resetJoystick(){ joystickActive=false; joystickVector={x:0,y:0}; knob.style.transform='translate(-50%,-50%)'; }
            joyArea.addEventListener('touchstart', (e)=>{ e.preventDefault(); const t=e.touches[0]; updateJoystick(t.clientX,t.clientY); });
            document.addEventListener('touchmove', (e)=>{ if(joystickActive) for(let t of e.touches) if(joyArea.contains(t.target)){ updateJoystick(t.clientX,t.clientY); e.preventDefault(); break; } });
            document.addEventListener('touchend', ()=>resetJoystick());
            window.addEventListener('keydown', (e)=>{ if(keyState.hasOwnProperty(e.key)){ keyState[e.key]=true; e.preventDefault(); } });
            window.addEventListener('keyup', (e)=>{ if(keyState.hasOwnProperty(e.key)) keyState[e.key]=false; });
            
            document.getElementById('zoom-in-btn').addEventListener('click',()=>{ isoZoom = Math.max(0.55, isoZoom-0.12); showMessage(`Zoom ${Math.round(isoZoom*100)}%`,300); });
            document.getElementById('zoom-out-btn').addEventListener('click',()=>{ isoZoom = Math.min(1.8, isoZoom+0.12); showMessage(`Zoom ${Math.round(isoZoom*100)}%`,300); });
            document.getElementById('magic-btn').addEventListener('click', ()=>castAreaMagic());
            document.getElementById('firecone-btn').addEventListener('click', ()=>fireCone());
            
            canvas.addEventListener('pointerdown', (e)=>{
                if(!gameActive) return;
                const pick = scene.pick(e.clientX, e.clientY, m=> enemies.some(en=>en.mesh===m) || chests.some(c=>c.mesh===m));
                if(pick.hit && pick.pickedMesh){
                    if(enemies.some(en=>en.mesh===pick.pickedMesh)){
                        const enemy = enemies.find(en=>en.mesh===pick.pickedMesh);
                        if(enemy && enemy.alive){
                            enemy.health -= baseDamage;
                            if(enemy.health<=0){
                                enemy.mesh.dispose();
                                enemy.alive = false;
                                dropLoot(enemy.mesh.position.clone());
                                showMessage("💀 ENEMIGO DERROTADO",500);
                                updateUI();
                            } else showMessage(`⚔️ ${baseDamage} daño`,400);
                            if(enemy.roomId !== undefined){
                                for(let other of enemies){
                                    if(other.roomId === enemy.roomId && other !== enemy && other.alive && !other.aggroed) other.aggroed = true;
                                }
                            }
                        }
                    } else if(chests.some(c=>c.mesh===pick.pickedMesh)){
                        const chest = chests.find(c=>c.mesh===pick.pickedMesh);
                        if(chest && !chest.opened) openChest(chest);
                    }
                    e.preventDefault();
                }
            });
            
            function restartGame(){
                gameActive = true;
                playerHealth = maxHealth;
                currentMana = maxMana;
                baseDamage = 24;
                armor = 5;
                gold = 0;
                currentDepth = 1;
                updateUI();
                loadLevel(1);
                document.getElementById('death-overlay').classList.add('hide');
                showMessage("⚔️ AVENTURA RENACIDA ⚔️",2000);
            }
            document.getElementById('restart-btn').addEventListener('click', restartGame);
            
            let lastTime = performance.now();
            scene.onBeforeRenderObservable.add(()=>{
                const now = performance.now();
                let dt = Math.min(0.033, (now-lastTime)/1000);
                lastTime = now;
                if(gameActive && player){
                    updateMovement(dt);
                    updateEnemies(dt);
                    checkItemPickup();
                }
            });
            
            createPlayer();
            loadLevel(1);
            engine.runRenderLoop(()=> scene.render());
            window.addEventListener('resize', ()=> engine.resize());
        })();
    </script>
</body>
</html>
